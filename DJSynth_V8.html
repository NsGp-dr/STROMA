<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DJSTROMA · EXPRESSIVE BEATMAKER PRO v2.2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&amp;family=Syne:wght@700;800&amp;display=swap" rel="stylesheet">
<style>
/* ───────────────────────────────────────
   DESIGN TOKENS — Night / Day
   ─────────────────────────────────────── */
:root {
  --bg:        #08090b;
  --surface:   #111317;
  --surface2:  #181b22;
  --border:    #242933;
  --text:      #f0f2f5;
  --text-dim:  #4e5565;
  --text-mid:  #8a92a3;
  --left:      #f5b922;
  --left-glow: rgba(245,185,34,0.45);
  --left-dim:  rgba(245,185,34,0.08);
  --right:     #22b9f5;
  --right-glow:rgba(34,185,245,0.45);
  --right-dim: rgba(34,185,245,0.08);
  --shadow:    0 4px 30px rgba(0,0,0,0.7);
  --radius:    12px;
  --radius-sm: 6px;
}
[data-theme="day"] {
  --bg:        #f4f0e6;
  --surface:   #ffffff;
  --surface2:  #e9e3d8;
  --border:    #cfc9bc;
  --text:      #0f1012;
  --text-dim:  #8b8373;
  --text-mid:  #5c5757;
  --left:      #ba7500;
  --left-glow: rgba(186,117,0,0.35);
  --left-dim:  rgba(186,117,0,0.06);
  --right:     #007cb8;
  --right-glow:rgba(0,124,184,0.35);
  --right-dim: rgba(0,124,184,0.06);
}

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html, body {
  width:100%; height:100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size:13px;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: none;
}

#canvas-bg,
#canvas-main,
#canvas-ui {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
}
#canvas-bg   { z-index: 1; }  
#canvas-main { z-index: 2; }  
#canvas-ui   { z-index: 3; pointer-events:none; } 

/* ── HUD HEADER RESPONSIVO ── */
#hud {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  flex-wrap: nowrap;
  gap: 10px;
  padding: 0 16px;
  height: 56px;
  background: linear-gradient(to bottom, rgba(8,9,11,0.96) 80%, transparent);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  overflow: hidden;
}

[data-theme="day"] #hud {
  background: linear-gradient(to bottom, rgba(244,240,230,0.98) 80%, transparent);
  border-bottom: 1px solid rgba(0,0,0,0.08);
}
#wordmark {
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 800;
  letter-spacing: .5px;
  color: var(--text);
  white-space: nowrap;
  flex-shrink: 0;
}
#wordmark em { color: var(--left); font-style:normal; }
.h-sep { width:1px; height:22px; background:var(--border); flex-shrink:0; }
.spacer { flex:1; min-width: 4px; }

.hctl { display:flex; align-items:center; gap:6px; flex-shrink:0; }
.hctl label { font-size:9px; letter-spacing:.08em; color:var(--text-dim); white-space:nowrap; font-weight:600; }

select {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size:11px;
  padding: 4px 6px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  outline: none;
}
select:focus { border-color:var(--left); }

.pill {
  display:inline-flex; align-items:center; gap:4px;
  padding: 5px 10px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: rgba(255,255,255,0.03);
  color: var(--text-mid);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  cursor: pointer;
  white-space: nowrap;
  transition: background .15s, border-color .15s, color .15s, transform .05s;
  flex-shrink: 0;
}
.pill:hover { background: rgba(255,255,255,0.08); color: var(--text); border-color: var(--text-dim); }
.pill:active { transform: scale(0.97); }
.pill.on { background: var(--left); color: var(--bg); border-color: var(--left); font-weight:500; }
.pill.active-mode { background: #2ec4b6; color: #08090b; border-color: #2ec4b6; font-weight: bold; }
.pill.rec-on { background: #e63946; color:#fff; border-color:#e63946; animation: recpulse 1.2s infinite; }
@keyframes recpulse { 0%,100%{opacity:1} 50%{opacity:.5} }

/* ── RESPONSIVE ADAPTATION ── */
@media (max-width: 768px) {
  #wordmark, .h-sep, .hctl label {
    display: none !important;
  }
  #hud {
    justify-content: space-between;
    padding: 0 8px;
    gap: 4px;
  }
  .pill {
    padding: 5px 8px;
    font-size: 10px;
  }
  select {
    padding: 4px 4px;
    font-size: 10px;
  }
}

/* ── STATUS BAR ── */
#statusbar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 16px;
  height: 38px;
  background: linear-gradient(to top, rgba(8,9,11,0.92) 70%, transparent);
  border-top: 1px solid rgba(255,255,255,0.04);
}
[data-theme="day"] #statusbar {
  background: linear-gradient(to top, rgba(244,240,230,0.95) 70%, transparent);
  border-top: 1px solid rgba(0,0,0,0.05);
}
#cam-indicator { display:flex; align-items:center; gap:6px; }
.cam-dot { width:7px; height:7px; border-radius:50%; background:var(--text-dim); }
.cam-dot.ok   { background:#2ec4b6; box-shadow: 0 0 8px #2ec4b6; }
.cam-dot.err  { background:#e63946; box-shadow: 0 0 8px #e63946; }
.cam-dot.wait { background:#ff9f1c; animation:blink 0.6s infinite alternate; }
@keyframes blink { 0%{opacity:1} 100%{opacity:0.2} }
.cam-lbl { font-size:10px; color:var(--text-dim); font-weight:500; letter-spacing: 0.05em; }

#scope-wrap { flex:1; height:24px; overflow:hidden; }
#scope { width:100%; height:100%; display:block; }
#vu { width:60px; height:4px; background:var(--surface2); border-radius:2px; overflow:hidden; flex-shrink:0; }
#vu-fill { height:100%; width:0; background:linear-gradient(90deg,#2ec4b6,#ff9f1c,#e63946); border-radius:2px; transition:width .04s; }
#rec-timer { color:#e63946; font-size:11px; min-width:30px; font-weight: bold; }

/* ── HUD READOUTS ── */
#readout-left, #readout-right {
  position: fixed;
  top: 72px;
  z-index: 9;
  display: flex;
  flex-direction: column;
  gap: 3px;
  pointer-events: none;
}
#readout-left  { left: 16px; }
#readout-right { right: 16px; align-items: flex-end; }
.readout-tag {
  font-family: 'Syne', sans-serif;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: .12em;
  text-transform: uppercase;
  opacity: .6;
}
#readout-left  .readout-tag  { color: var(--left); }
#readout-right .readout-tag  { color: var(--right); }
.readout-chord {
  font-family: 'Syne', sans-serif;
  font-size: 28px;
  font-weight: 800;
  line-height: 1;
  letter-spacing: -.03em;
}
#readout-left  .readout-chord { color: var(--left);  text-shadow: 0 0 30px var(--left-glow); }
#readout-right .readout-chord { color: var(--right); text-shadow: 0 0 30px var(--right-glow); }
.readout-info { font-size:10px; color:var(--text-dim); letter-spacing:.05em; }

/* ── TUNING MODAL ── */
#freq-modal {
  display:none; position:fixed; inset:0;
  background:rgba(4,5,6,0.85); z-index:200;
  align-items:center; justify-content:center; backdrop-filter:blur(8px);
}
#freq-modal.open { display:flex; }
#freq-box {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:24px;
  width:min(350px,92vw);
  display:flex; flex-direction:column; gap:14px;
  box-shadow: var(--shadow);
}
#freq-box h3 { font-family:'Syne',sans-serif; font-size:16px; font-weight:800; }
.slider-row { display:flex; flex-direction:column; gap:6px; }
.slider-row label { font-size:11px; color:var(--text-dim); }
input[type=range] {
  width:100%; cursor:pointer;
  appearance:none; -webkit-appearance:none;
  height:5px;
  background:linear-gradient(90deg,var(--left) var(--pct,50%),var(--border) var(--pct,50%));
  border-radius:3px; outline:none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; width:16px; height:16px;
  background:var(--text); border-radius:50%; cursor:pointer; box-shadow:0 1px 4px rgba(0,0,0,0.4);
}
.slider-val { font-size:11px; color:var(--text-mid); text-align:right; margin-top:-2px; }
.modal-close {
  align-self:flex-end; padding:6px 18px;
  border:1px solid var(--border); border-radius:20px;
  background:var(--surface2); color:var(--text);
  font-family:'DM Mono',monospace; font-size:11px; cursor:pointer;
}

#toast {
  position:fixed; bottom:52px; left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--text); color:var(--bg);
  padding:8px 20px; border-radius:24px;
  font-size:11px; font-weight:600;
  opacity:0; pointer-events:none;
  transition:opacity .25s, transform .25s;
  z-index:999; white-space:nowrap;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

#zone-label-l, #zone-label-r {
  position: fixed; top: 50%; transform: translateY(-50%);
  z-index: 8; pointer-events:none;
  font-family: 'Syne', sans-serif;
  font-size: 10px; font-weight: 800;
  letter-spacing: .2em; text-transform: uppercase;
  writing-mode: vertical-rl;
  opacity: 0.15;
}
#zone-label-l { left: 8px; color: var(--left); }
#zone-label-r { right: 8px; color: var(--right); transform: translateY(-50%) rotate(180deg); }

#cam-video { position:fixed; top:-9999px; left:-9999px; width:320px; height:240px; }
</style>
</head>
<body data-theme="night">

<canvas id="canvas-bg"></canvas>

<video id="cam-video" width="320" height="240" autoplay playsinline muted></video>

<input type="file" id="score-file-input" accept="audio/mp3,audio/wav,audio/mpeg" style="display:none">

<header id="hud">
  <div id="wordmark">DJSTROMA<em>·</em> BEATMAKER PRO <span style="font-size:9px; font-weight:400; opacity:0.35; font-family:'DM Mono'">[v2.2]</span></div>
  <div class="h-sep"></div>

</div>

<footer id="statusbar">
  <div id="cam-indicator">
    <div class="cam-dot wait" id="cam-dot"></div>
    <span class="cam-lbl" id="cam-label">INIT</span>
  </div>
  <div class="h-sep"></div>
  <div id="scope-wrap"><canvas id="scope"></canvas></div>
  <div class="h-sep"></div>
  <div id="vu"><div id="vu-fill"></div></div>
</footer>

<div id="freq-modal">
  <div id="freq-box">
    <h3>Tuning Parameters (Just Intonation)</h3>
    <div class="slider-row">
      <label>Base frequency</label>
      <input type="range" id="freq-sl" min="80" max="1000" value="261" step="1">

      Vinyl noise (Lo-fi)

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
/* ═══════════════════════════════════════════════════════════════
   DJSTROMA BEATMAKER PRO v2.2 — ENGINE CODE (CORREGIDO)
   ═══════════════════════════════════════════════════════════════ */
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

const JI_RATIOS = {
  major: [1/1, 9/8, 5/4, 4/3, 3/2, 5/3, 15/8],
  minor: [1/1, 9/8, 6/5, 4/3, 3/2, 8/5, 9/5],
  penta_maj: [1/1, 9/8, 5/4, 3/2, 5/3],
  penta_min: [1/1, 6/5, 4/3, 3/2, 9/5]
};

const ROMAN = ['I','II','III','IV','V','VI','VII','VIII','IIb','IIIb','Vb','VIb','VIIb','IVadd','IXsus','Vaug'];
const LEFT_DEGREES = [0,1,2,3,4,5,6,7,0,2,4,6,1,3,5,7];

function getJIChordIntervals(degIdx, scaleName, style) {
  const ratios = JI_RATIOS[scaleName];
  const len = ratios.length;
  const r = ratios[degIdx % len];
  
  // CORRECCIÓN ACOUSTIC II: Uso estricto de series de armónicos enteros puros (Just Intonation)
  if (style === 'lofi' || style === 'steven') {
    return [r, r * 2, r * 3, r * 4, r * 5];
  }
  
  const t3 = ratios[(degIdx + 2) % len] * ((degIdx + 2) >= len ? 2 : 1);
  const t5 = ratios[(degIdx + 4) % len] * ((degIdx + 4) >= len ? 2 : 1);
  const t7 = ratios[(degIdx + 6) % len] * ((degIdx + 6) >= len ? 2 : 1);
  
  if(style==='organ') return [r, r * 1.5, r * 2.0, r * 3.0];
  if(style==='xylophone') return [r, t3, t5];
  return [r, t3, t5, t7];
}

function chordName(degIdx, scaleName, style) {
  const ext = {steven:'_Harmonics', lofi:'_PureJI', piano:'_maj7JI', organ:'_Pure5', xylophone:'_Triad'};
  return (ROMAN[degIdx]||'?')+(ext[style]||'');
}

const state = { 
  scale:'penta_min', style:'lofi', baseFreq:261.63, baseOct:3, vol:0.70, vinyl:false, theme:'night', 
  camReady:false, rawLandmarks:{L:null,R:null}, bpm:90, loopBeats:4, loopDuration:2.66, 
  loopStartCtxTime:0, isRecordingLoop:false, loopEvents:[],
  currentRightTilt: 0, currentRightVelocity: 1.0, currentLeftVelocity: 1.0,
  scoreMode: false, scoreAudioBuffer: null, scoreSourceNode: null, scoreAnalyserNode: null
};

let ctx=null, masterGain=null, limiter=null, reverb=null, analyserNode=null, recDest=null, mediaRecorder=null, recordedChunks=[];
let vinylSrc=null, vinylGain=null, activeVoices=new Map(), dynFilter=null, melodyFilter=null;

let lastActiveLeftZone = -1;
let lastActiveRightZone = -1;

// CORRECCIÓN ACOUSTIC I: Rediseño estructural de ganancias individuales para preservar el headroom
const MAX_VOICES=45, SYNTH={
  steven:{wave:'sine',A:.03,D:.3,S:.6,R:.4,spread:3,filt:6000,gain:.18},
  lofi:{wave:'triangle',A:.04,D:.35,S:.6,R:.28,spread:5,filt:1600,gain:.20},
  piano:{wave:'triangle',A:.008,D:.8,S:.3,R:.45,spread:1,filt:8000,gain:.22},
  organ:{wave:'sine',A:.04,D:.0,S:.9,R:.25,spread:0,filt:4000,gain:.15,harmonics:[1,2,3,4]},
  xylophone:{wave:'sine',A:.002,D:.25,S:.0,R:.18,spread:0,filt:12000,gain:.25}
};

function ensureAudio() { 
  if(ctx) return; 
  ctx=new (window.AudioContext||window.webkitAudioContext)(); 
  masterGain=ctx.createGain(); 
  masterGain.gain.setValueAtTime(state.vol, ctx.currentTime);

  reverb = ctx.createConvolver();
  const reverbTime = 1.6;
  const sampleRate = ctx.sampleRate;
  const length = sampleRate * reverbTime;
  const impulse = ctx.createBuffer(2, length, sampleRate);
  for (let channel = 0; channel < 2; channel++) {
    const channelData = impulse.getChannelData(channel);
    for (let i = 0; i < length; i++) {
      channelData[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 2.2);
    }
  }
  reverb.buffer = impulse;
  const reverbGain = ctx.createGain(); reverbGain.gain.setValueAtTime(0.20, ctx.currentTime);
  const dryGain = ctx.createGain(); dryGain.gain.setValueAtTime(0.80, ctx.currentTime);

  // CORRECCIÓN ACOUSTIC I: Umbral de limitación estricto para evitar clipping
  limiter=ctx.createDynamicsCompressor(); 
  limiter.threshold.setValueAtTime(-3.0, ctx.currentTime); 
  limiter.knee.setValueAtTime(3, ctx.currentTime); 
  limiter.ratio.setValueAtTime(16, ctx.currentTime); 
  limiter.attack.setValueAtTime(0.003, ctx.currentTime);
  limiter.release.setValueAtTime(0.08, ctx.currentTime);

  analyserNode=ctx.createAnalyser(); analyserNode.fftSize=256;
  recDest=ctx.createMediaStreamDestination();

  dynFilter=ctx.createBiquadFilter(); dynFilter.type='lowpass'; dynFilter.frequency.setValueAtTime(3500, ctx.currentTime); dynFilter.Q.setValueAtTime(1.0, ctx.currentTime);
  melodyFilter=ctx.createBiquadFilter(); melodyFilter.type='lowpass'; melodyFilter.frequency.setValueAtTime(3200, ctx.currentTime); melodyFilter.Q.setValueAtTime(1.2, ctx.currentTime);

  masterGain.connect(limiter);
  limiter.connect(dynFilter);
  limiter.connect(melodyFilter);
  dynFilter.connect(reverb); reverb.connect(analyserNode);
  melodyFilter.connect(reverb); 
  dynFilter.connect(dryGain); dryGain.connect(analyserNode);
  melodyFilter.connect(dryGain);
  analyserNode.connect(ctx.destination);
  analyserNode.connect(recDest);

  const bsz=ctx.sampleRate*2, nb=ctx.createBuffer(1,bsz,ctx.sampleRate); 
  const nd=nb.getChannelData(0); for(let i=0;i<bsz;i++) nd[i]=(Math.random()*2-1)*0.01;
  vinylSrc=ctx.createBufferSource(); vinylSrc.buffer=nb; vinylSrc.loop=true; 
  const nf=ctx.createBiquadFilter(); nf.type='bandpass'; nf.frequency.setValueAtTime(700, ctx.currentTime); nf.Q.setValueAtTime(0.6, ctx.currentTime);
  vinylGain=ctx.createGain(); vinylGain.gain.setValueAtTime(0, ctx.currentTime); vinylSrc.connect(nf); nf.connect(vinylGain); vinylGain.connect(masterGain); vinylSrc.start();
  state.loopDuration = (60 / state.bpm) * state.loopBeats;
}

function playNote(key, freq, customGain=1.0, initDetune=0) { 
  if(!ctx) return; 
  if(activeVoices.size>=MAX_VOICES){const oldest=activeVoices.keys().next().value; stopNote(oldest, true);} 
  const p=SYNTH[state.style], now=ctx.currentTime, nodes=[]; 
  const routeToFilter = key.startsWith('R_') ? melodyFilter : dynFilter; 

  const totalHarmonics = (p.harmonics||[1]).length;

  (p.harmonics||[1]).forEach((h,hi)=>{ 
    const osc = ctx.createOscillator(); 
    const env = ctx.createGain(); 
    osc.type = p.wave; 
    osc.frequency.setValueAtTime(freq*h, now); 
    osc.detune.setValueAtTime(((Math.random()-.5)*p.spread*2) + initDetune, now); 
    
    // Distribución equilibrada de ganancia por armónico y polifonía para proteger el Headroom
    const g = (p.gain * customGain) / (hi + 1) / totalHarmonics; 
    
    env.gain.setValueAtTime(0, now); 
    env.gain.linearRampToValueAtTime(g, now + Math.max(0.006, p.A)); 
    
    // CORRECCIÓN ACOUSTIC III: Transición suave exponencial al nivel de Sostenido
    env.gain.setTargetAtTime(g * p.S, now + Math.max(0.006, p.A), Math.max(0.01, p.D)); 
    
    osc.connect(env); 
    env.connect(routeToFilter); 
    osc.start(now); 
    nodes.push({osc, env, targetGain: g*p.S}); 
  }); 

  activeVoices.set(key, {nodes, p:p}); 
  if(vinylGain){const want=(state.vinyl&&state.style==='lofi')?0.06:0; vinylGain.gain.setTargetAtTime(want, now, .1); } 
}

function stopNote(key, immediate=false) { 
  const v=activeVoices.get(key); 
  if(!v) return; 
  const now=ctx.currentTime, p=v.p; 
  v.nodes.forEach(({osc, env})=>{ 
    if(!env) return; 
    try{ 
      env.gain.cancelScheduledValues(now); 
      env.gain.setValueAtTime(env.gain.value, now); 
      if(immediate) {
        // CORRECCIÓN ACOUSTIC III: Rampa exponencial ultracorta en lugar de corte seco a 0 para extinguir clics
        env.gain.setTargetAtTime(0, now, 0.005); 
        osc.stop(now + 0.03);
      } else {
        // CORRECCIÓN ACOUSTIC III: Desvanecimiento logarítmico natural basado en constante de tiempo
        env.gain.setTargetAtTime(0, now, Math.max(0.01, p.R * 0.4)); 
        osc.stop(now + (p.R * 3) + 0.1); 
      }
    }catch(e){} 
  }); 
  activeVoices.delete(key); 
}

function stopAllNotesByPrefix(prefix) {
  for (const key of activeVoices.keys()) {
    if (key.startsWith(prefix)) stopNote(key);
  }
}

function playChord(degIdx, fingerIdx, saveToSequencer=true) { 
  const rootFreq = state.baseFreq * Math.pow(2, (state.baseOct - 3));
  const jiMultipliers = getJIChordIntervals(degIdx, state.scale, state.style);
  
  stopAllNotesByPrefix(`L_${fingerIdx}`);
  jiMultipliers.forEach((mult, i) => {
    playNote(`L_${fingerIdx}_${i}`, rootFreq * mult, state.currentLeftVelocity);
  }); 
  if(saveToSequencer && state.isRecordingLoop) pushLoopEvent('chord', degIdx); 
}

function playMelodyNote(noteIdx, fingerIdx, saveToSequencer=true) { 
  const ratios = JI_RATIOS[state.scale];
  const len = ratios.length;
  const octOffset = Math.floor(noteIdx / len);
  const ratio = ratios[noteIdx % len];
  const freq = state.baseFreq * ratio * Math.pow(2, octOffset + 1);

  stopAllNotesByPrefix(`R_${fingerIdx}`);
  playNote(`R_${fingerIdx}_${noteIdx}`, freq, state.currentRightVelocity, state.currentRightTilt); 
  if(saveToSequencer && state.isRecordingLoop) pushLoopEvent('melody', noteIdx); 
}

function pushLoopEvent(type,value){ 
  if(!ctx||state.loopStartCtxTime===0) return; 
  let offset=ctx.currentTime-state.loopStartCtxTime; 
  const stepTime=(60/state.bpm)/4; 
  offset=Math.round(offset/stepTime)*stepTime; 
  if(offset>=state.loopDuration) offset=0; 
  const exists=state.loopEvents.some(e=>e.type===type&&e.val===value&&Math.abs(e.timeOffset-offset)<0.02); 
  if(!exists){ 
    state.loopEvents.push({type,val:value,timeOffset:offset,triggered:false}); 
    document.getElementById('dl-btn').style.display=''; 
  } 
}

function runLoopSequencerEngine(){ 
  if(!ctx) return; 
  const now=ctx.currentTime; 
  if(state.loopStartCtxTime===0) state.loopStartCtxTime=now; 
  let currentOffset=now-state.loopStartCtxTime; 
  if(currentOffset>=state.loopDuration){ 
    state.loopStartCtxTime+=state.loopDuration; 
    currentOffset=now-state.loopStartCtxTime; 
    state.loopEvents.forEach(e=>e.triggered=false); 
  } 
  state.loopEvents.forEach(e=>{ 
    if(!e.triggered&&currentOffset>=e.timeOffset){ 
      e.triggered=true; 
      if(e.type==='chord'){ 
        playChord(e.val,99,false); 
        setTimeout(()=> stopAllNotesByPrefix('L_99'), 700); 
      } else if(e.type==='melody'){ 
        playMelodyNote(e.val,99,false); 
        setTimeout(()=> stopAllNotesByPrefix('R_99'), 450); 
      } 
    } 
  }); 
}

let chordZones=[], melodyTrapezoidPads=[];

function buildZones(){
  chordZones=[]; melodyTrapezoidPads=[];
  const LW=W*0.5; 
  
  const ringDefs=[ { count:8, rRing: Math.min(LW*0.28, H*0.24), startDegIdx:0 }, { count:8, rRing: Math.min(LW*0.15, H*0.12), startDegIdx:8 } ];
  let zIdx=0;
  ringDefs.forEach(ring=>{ 
    for(let i=0;i<ring.count;i++){ 
      const angle=(i/ring.count)*Math.PI*2 - Math.PI/2; 
      const cx=LW*0.5 + Math.cos(angle)*ring.rRing; 
      const cy=H*0.5 + Math.sin(angle)*ring.rRing; 
      const r=ring.rRing*0.28 + 14; 
      const degIdx=LEFT_DEGREES[zIdx%LEFT_DEGREES.length]; 
      chordZones.push({ cx,cy,r,degIdx,label:chordName(degIdx,state.scale,state.style), active:false, glow:0 }); 
      zIdx++; 
    } 
  });

  const rows = 4;
  const cols = 3;
  const lerp = (a, b, t) => a + (b - a) * t;

  for(let r=0; r<rows; r++) {
    const tRow = r / (rows - 1 || 1);
    const xLeft = lerp(W * 0.58, W * 0.62, tRow);
    const xRight = lerp(W * 0.81, W * 0.84, tRow);
    const yRow = lerp(H * 0.22, H * 0.78, tRow);

    for(let c=0; c<cols; c++) {
      const tCol = c / (cols - 1 || 1);
      const cx = lerp(xLeft, xRight, tCol);
      const cy = yRow;
      const noteIdx = r * cols + c;

      const ratios = JI_RATIOS[state.scale];
      const ratio = ratios[noteIdx % ratios.length];
      const oct = Math.floor(noteIdx / ratios.length) + 4;
      const label = NOTE_NAMES[Math.round(12 * Math.log2(ratio)) % 12] + oct;

      melodyTrapezoidPads.push({
        cx, cy, r: 32, noteIdx, label, active: false, glow: 0
      });
    }
  }
}

let particles=[]; 
function emitParticles(x,y,color,n=6,burst=false){ 
  for(let i=0;i<n;i++){ 
    const angle=Math.random()*Math.PI*2; 
    const spd=burst?2+Math.random()*4:0.5+Math.random()*1.5; 
    particles.push({ x,y, vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd, life:1.0, decay:burst?0.025:0.012, r:burst?4:2, color }); 
  } 
}

let handPos={L:[],R:[]};

function processHandInputs(){
  if(state.scoreMode) return; 
  
  const colLeft='#f5b922', colRight='#22b9f5';
  const now = ctx ? ctx.currentTime : 0;

  if(state.rawLandmarks.L && dynFilter){
    const lm = state.rawLandmarks.L;
    if(lm[8] && lm[4]){
      const ext = Math.hypot(lm[8].x - lm[4].x, lm[8].y - lm[4].y);
      const cutoff = 250 + (ext * 8500);
      dynFilter.frequency.setTargetAtTime(Math.max(150, Math.min(15000, cutoff)), now, 0.08);
    }
  }

  let activeLeftIdx = -1;
  if (handPos.L.length > 0) {
    const f = handPos.L[0];
    emitParticles(f.sx, f.sy, colLeft, 1);
    let bestD = Infinity;
    chordZones.forEach((z, i) => {
      const d = Math.hypot(f.sx - z.cx, f.sy - z.cy);
      if (d < z.r * 1.5 && d < bestD) { bestD = d; activeLeftIdx = i; }
    });
  }

  if (activeLeftIdx !== lastActiveLeftZone) {
    if (lastActiveLeftZone >= 0) { stopAllNotesByPrefix('L_0'); chordZones[lastActiveLeftZone].active = false; }
    if (activeLeftIdx >= 0) {
      ensureAudio();
      chordZones[activeLeftIdx].active = true;
      playChord(chordZones[activeLeftIdx].degIdx, 0);
      document.getElementById('chord-left').textContent = chordZones[activeLeftIdx].label;
      emitParticles(chordZones[activeLeftIdx].cx, chordZones[activeLeftIdx].cy, colLeft, 12, true);
    } else {
      document.getElementById('chord-left').textContent = '—';
    }
    lastActiveLeftZone = activeLeftIdx;
  }

  let activeRightIdx = -1;
  if (handPos.R.length > 0) {
    const f = handPos.R[0];
    emitParticles(f.sx, f.sy, colRight, 1);
    let bestD = Infinity;
    melodyTrapezoidPads.forEach((pad, i) => {
      const d = Math.hypot(f.sx - pad.cx, f.sy - pad.cy);
      if (d < pad.r * 1.6 && d < bestD) { bestD = d; activeRightIdx = i; }
    });
  }

  if (activeRightIdx !== lastActiveRightZone) {
    if (lastActiveRightZone >= 0) { stopAllNotesByPrefix('R_0'); melodyTrapezoidPads[lastActiveRightZone].active = false; }
    if (activeRightIdx >= 0) {
      ensureAudio();
      melodyTrapezoidPads[activeRightIdx].active = true;
      playMelodyNote(melodyTrapezoidPads[activeRightIdx].noteIdx, 0);
      document.getElementById('chord-right').textContent = melodyTrapezoidPads[activeRightIdx].label;
      emitParticles(melodyTrapezoidPads[activeRightIdx].cx, melodyTrapezoidPads[activeRightIdx].cy, colRight, 12, true);
    } else {
      document.getElementById('chord-right').textContent = '—';
    }
    lastActiveRightZone = activeRightIdx;
  }

  if (activeRightIdx >= 0 && ctx) {
    const activeKey = `R_0_${melodyTrapezoidPads[activeRightIdx].noteIdx}`;
    const voice = activeVoices.get(activeKey);
    if (voice) {
      voice.nodes.forEach(n => {
        // CORRECCIÓN ACOUSTIC III: Rampas logarítmicas de amortiguación para actualización de detune y volumen continuo
        n.osc.detune.setTargetAtTime(state.currentRightTilt, now, 0.04);
        n.env.gain.setTargetAtTime(n.targetGain * state.currentRightVelocity, now, 0.03);
      });
    }
  }

  chordZones.forEach(z => { z.glow = z.active ? Math.min(1, z.glow+0.25) : Math.max(0, z.glow-0.03); });
  melodyTrapezoidPads.forEach(p => { p.glow = p.active ? Math.min(1, p.glow+0.25) : Math.max(0, p.glow-0.04); });
}

const scoreBtn = document.getElementById('score-btn');

scoreFileInput.addEventListener('change', (e) => {

  if(!file) return;

function startScoreMode(audioBuffer) {
  state.scoreMode = true;
  state.scoreAudioBuffer = audioBuffer;
  scoreBtn.textContent = "⏹ STOP SCORE";
  scoreBtn.classList.add('active-mode');
  showToast("Modo Partitura: Mapeando Just Intonation...");

  state.scoreSourceNode = ctx.createBufferSource();
  state.scoreSourceNode.buffer = audioBuffer;
  
  state.scoreAnalyserNode = ctx.createAnalyser();
  state.scoreAnalyserNode.fftSize = 512;
  
  state.scoreSourceNode.connect(state.scoreAnalyserNode);
  state.scoreAnalyserNode.connect(ctx.destination);
  
  state.scoreSourceNode.start(0);
  state.scoreSourceNode.onended = () => { if(state.scoreMode) stopScoreMode(); };
  
  executeScoreAnalysisLoop();
}

function stopScoreMode() {
  state.scoreMode = false;
  scoreBtn.textContent = "🎵 PARTITURA";
  scoreBtn.classList.remove('active-mode');
  showToast("Modo Cámara Restablecido");
  
  try {
    if(state.scoreSourceNode) { state.scoreSourceNode.stop(); state.scoreSourceNode.disconnect(); }
  } catch(e){}
  
  stopAllNotesByPrefix('L_');
  stopAllNotesByPrefix('R_');
  chordZones.forEach(z => z.active = false);
  melodyTrapezoidPads.forEach(p => p.active = false);
}

function executeScoreAnalysisLoop() {
  if(!state.scoreMode || !state.scoreAnalyserNode) return;
  
  const bufferLength = state.scoreAnalyserNode.frequencyBinCount;
  const dataArray = new Uint8Array(bufferLength);
  state.scoreAnalyserNode.getByteFrequencyData(dataArray);
  
  let maxVal = 0, maxBin = 0;
  for(let i = 4; i < bufferLength * 0.6; i++) { 
    if(dataArray[i] > maxVal) {
      maxVal = dataArray[i];
      maxBin = i;
    }
  }
  
  const nyquist = ctx.sampleRate / 2;
  const detectedFreq = maxBin * (nyquist / bufferLength);
  
  if(maxVal > 140) { 
    let bestPadIdx = 0;
    let minDiff = Infinity;
    
    melodyTrapezoidPads.forEach((pad, idx) => {
      const ratios = JI_RATIOS[state.scale];
      const ratio = ratios[pad.noteIdx % ratios.length];
      const oct = Math.floor(pad.noteIdx / ratios.length) + 4;
      const targetFreq = state.baseFreq * ratio * Math.pow(2, oct - 3);
      const diff = Math.abs(detectedFreq - targetFreq);
      if(diff < minDiff) { minDiff = diff; bestPadIdx = idx; }
    });
    
    if(bestPadIdx !== lastActiveRightZone) {
      if(lastActiveRightZone >= 0) melodyTrapezoidPads[lastActiveRightZone].active = false;
      melodyTrapezoidPads[bestPadIdx].active = true;
      playMelodyNote(melodyTrapezoidPads[bestPadIdx].noteIdx, 77, false); 
      document.getElementById('chord-right').textContent = melodyTrapezoidPads[bestPadIdx].label;
      emitParticles(melodyTrapezoidPads[bestPadIdx].cx, melodyTrapezoidPads[bestPadIdx].cy, '#22b9f5', 4, true);
      lastActiveRightZone = bestPadIdx;
      
      let assignedChord = melodyTrapezoidPads[bestPadIdx].noteIdx % chordZones.length;
      chordZones.forEach(z => z.active = false);
      chordZones[assignedChord].active = true;
      playChord(chordZones[assignedChord].degIdx, 77, false);
      document.getElementById('chord-left').textContent = chordZones[assignedChord].label;
    }
  } else {
    if(lastActiveRightZone >= 0) {
      melodyTrapezoidPads[lastActiveRightZone].active = false;
      stopAllNotesByPrefix('R_77');
      lastActiveRightZone = -1;
    }
    let anyActiveChord = chordZones.findIndex(z => z.active);
    if(anyActiveChord >= 0) {
      chordZones[anyActiveChord].active = false;
      stopAllNotesByPrefix('L_77');
    }
  }
  
  chordZones.forEach(z => { z.glow = z.active ? Math.min(1, z.glow+0.2) : Math.max(0, z.glow-0.03); });
  melodyTrapezoidPads.forEach(p => { p.glow = p.active ? Math.min(1, p.glow+0.2) : Math.max(0, p.glow-0.04); });

  requestAnimationFrame(executeScoreAnalysisLoop);
}

function onHandResults(results){ 
  if(state.scoreMode) return;
  handPos.L=[]; handPos.R=[]; state.rawLandmarks.L=null; state.rawLandmarks.R=null; 
  if(!results.multiHandLandmarks||results.multiHandLandmarks.length===0){ document.body.classList.remove('hands-active'); return; } 
  document.body.classList.add('hands-active'); 

  results.multiHandLandmarks.forEach((lm)=>{ 
    const wrist = lm[0];
    const middleMCP = lm[9];
    const indexTip = lm[8]; 

    if(indexTip && wrist && middleMCP){ 
      const screenX=(1-indexTip.x)*W; 
      const screenY=indexTip.y*H; 
      const side=screenX<W*0.5?'L':'R'; 
      state.rawLandmarks[side]=lm; 
      
      const handSize = Math.hypot(wrist.x - middleMCP.x, wrist.y - middleMCP.y);
      const normalizedVelocity = Math.max(0.3, Math.min(1.4, (handSize - 0.07) / 0.13));

      if (side === 'R') {
        state.currentRightVelocity = normalizedVelocity;
        const angle = Math.atan2(middleMCP.y - wrist.y, middleMCP.x - wrist.x) + Math.PI/2; 
        state.currentRightTilt = Math.max(-140, Math.min(140, angle * 230)); 
        document.getElementById('info-right').textContent = `Tilt: ${Math.round(state.currentRightTilt)}c | Dynam Z: ${Math.round(normalizedVelocity*100)}%`;
      } else {
        state.currentLeftVelocity = normalizedVelocity;
        document.getElementById('info-left').textContent = `Pegada Z: ${Math.round(normalizedVelocity*100)}%`;
      }

      handPos[side].push({sx:screenX,sy:screenY}); 
    } 
  }); 
}

let meshNodes=[], meshEdges=[], MESH_ROWS=7,MESH_COLS=5;
function buildMesh(){ meshNodes.length=0; meshEdges.length=0; const LW=W*0.5; const pad=40; for(let r=0;r<MESH_ROWS;r++) for(let c=0;c<MESH_COLS;c++){ const ox=pad+(LW-pad*2)*(c/(MESH_COLS-1)); const oy=60+(H-120)*(r/(MESH_ROWS-1)); meshNodes.push({x:ox,y:oy,vx:0,vy:0,ox,oy}); } for(let r=0;r<MESH_ROWS;r++) for(let c=0;c<MESH_COLS;c++){ const i=r*MESH_COLS+c; if(c<MESH_COLS-1) meshEdges.push([i,i+1]); if(r<MESH_ROWS-1) meshEdges.push([i,i+MESH_COLS]); if(c<MESH_COLS-1&&r<MESH_ROWS-1) meshEdges.push([i,i+MESH_COLS+1]); } }
function updateMesh(){ const allFingers=[...handPos.L]; const stiffness=0.06, damping=0.88; meshNodes.forEach(n=>{ let fx=(n.ox-n.x)*stiffness; let fy=(n.oy-n.y)*stiffness; allFingers.forEach(f=>{ const dx=n.x-f.sx, dy=n.y-f.sy; const d=Math.hypot(dx,dy)+1; if(d<130){ const force=(130-d)*(130-d)*0.00045; fx+=(dx/d)*force; fy+=(dy/d)*force; } }); chordZones.forEach(z=>{ if(z.active){ const dx=n.x-z.cx, dy=n.y-z.cy; const d=Math.hypot(dx,dy)+1; if(d<95){ const force=(95-d)*0.0006; fx+=(-dx/d)*force; fy+=(-dy/d)*force; } } }); n.vx=(n.vx+fx)*damping; n.vy=(n.vy+fy)*damping; n.x+=n.vx; n.y+=n.vy; }); }

const scopeCanvas=document.getElementById('scope'), scopeCtx=scopeCanvas.getContext('2d');
function resizeScope(){ const wrap=document.getElementById('scope-wrap'); if(wrap){ scopeCanvas.width=wrap.clientWidth; scopeCanvas.height=wrap.clientHeight; } }
function drawScope(){ 
  const SW=scopeCanvas.width, SH=scopeCanvas.height; scopeCtx.clearRect(0,0,SW,SH); if(!analyserNode) return; 
  const buf=new Uint8Array(analyserNode.frequencyBinCount); analyserNode.getByteTimeDomainData(buf); 
  scopeCtx.strokeStyle=document.body.dataset.theme==='day'?'#ba7500':'#22b9f5'; scopeCtx.lineWidth=1.5; scopeCtx.beginPath(); 
  const sw=SW/buf.length; for(let i=0;i<buf.length;i++){ const y=(buf[i]/128)*SH/2; i===0?scopeCtx.moveTo(0,y):scopeCtx.lineTo(i*sw,y); } 
  scopeCtx.stroke(); let sum=0; buf.forEach(v=>sum+=Math.abs(v-128)); const rms=Math.min((sum/buf.length/128)*200,100); 
  document.getElementById('vu-fill').style.width=rms+'%'; 
}

  const divX=W*0.5; ctxBg.fillStyle=document.body.dataset.theme!=='day'?'rgba(255,255,255,0.02)':'rgba(0,0,0,0.03)'; ctxBg.fillRect(divX-1,60,2,H-110);
  
  ctxM.clearRect(0,0,W,H); const meshAlpha=document.body.dataset.theme!=='day'?0.15:0.11; ctxM.strokeStyle=document.body.dataset.theme!=='day'?`rgba(245,185,34,${meshAlpha})`:`rgba(186,117,0,${meshAlpha})`; ctxM.lineWidth=0.7; 
  meshEdges.forEach(([a,b])=>{ const na=meshNodes[a], nb=meshNodes[b]; ctxM.beginPath(); ctxM.moveTo(na.x,na.y); ctxM.lineTo(nb.x,nb.y); ctxM.stroke(); });
  
  const tNow=ts*0.001, isNight=document.body.dataset.theme!=='day';
  
  chordZones.forEach((z,i)=>{ 
    const pulse=z.active?z.r*(1+0.07*Math.sin(tNow*15)):z.r*(0.98+0.02*Math.sin(tNow*1.2)); 
    if(z.glow>0.005){ 
      const grd=ctxM.createRadialGradient(z.cx,z.cy,pulse*0.3,z.cx,z.cy,pulse*2.2); const col=isNight?'245,185,34':'186,117,0'; 
      grd.addColorStop(0,`rgba(${col},${z.glow*0.25})`); grd.addColorStop(1,`rgba(${col},0)`); ctxM.beginPath(); ctxM.arc(z.cx,z.cy,pulse*2.2,0,Math.PI*2); ctxM.fillStyle=grd; ctxM.fill(); 
    } 
    const col=isNight?'245,185,34':'186,117,0'; ctxM.beginPath(); ctxM.arc(z.cx,z.cy,pulse,0,Math.PI*2); ctxM.strokeStyle=z.active?`rgba(${col},0.95)`:`rgba(${col},${0.14 + z.glow*0.45})`; ctxM.lineWidth=z.active?2.5:1; ctxM.stroke(); 
    ctxM.font=`${z.active?700:500} 11px 'Syne', sans-serif`; ctxM.fillStyle=`rgba(${col},${z.active?1.0:0.40 + z.glow * 0.4})`; ctxM.textAlign='center'; ctxM.textBaseline='middle'; ctxM.fillText(z.label,z.cx,z.cy); 
  });
  
  const colR = isNight ? '34,185,245' : '0,124,184';
  melodyTrapezoidPads.forEach(pad => {
    const pulseR = pad.active ? pad.r * (1 + 0.06 * Math.sin(tNow * 16)) : pad.r;
    if(pad.glow > 0.005) {
      const grd = ctxM.createRadialGradient(pad.cx, pad.cy, pulseR*0.3, pad.cx, pad.cy, pulseR*2.2);
      grd.addColorStop(0, `rgba(${isNight?'34,185,245':'0,124,184'},${pad.glow*0.30})`);
      grd.addColorStop(1, 'transparent');
      ctxM.beginPath(); ctxM.arc(pad.cx, pad.cy, pulseR*2.2, 0, Math.PI*2);
      ctxM.fillStyle = grd; ctxM.fill();
    }
    
    ctxM.beginPath();
    ctxM.arc(pad.cx, pad.cy, pulseR, 0, Math.PI*2);
    ctxM.strokeStyle = pad.active ? `rgba(${colR}, 0.95)` : `rgba(${colR}, ${0.18 + pad.glow * 0.55})`;
    ctxM.lineWidth = pad.active ? 2.5 : 1.2;
    ctxM.stroke();
    if(pad.active) { ctxM.fillStyle = `rgba(${colR}, 0.08)`; ctxM.fill(); }
    
    ctxM.font = `${pad.active?700:500} 11px 'DM Mono', monospace`;
    ctxM.fillStyle = `rgba(${colR}, ${pad.active?1.0:0.40 + pad.glow * 0.45})`;
    ctxM.textAlign = 'center'; ctxM.textBaseline = 'middle';
    ctxM.fillText(pad.label, pad.cx, pad.cy);
  });

  for(let i=particles.length-1;i>=0;i--){ 
    const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.04; p.life-=p.decay; if(p.life<=0){ particles.splice(i,1); continue; } 
    ctxM.beginPath(); ctxM.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctxM.fillStyle=p.color+Math.round(p.life*255).toString(16).padStart(2,'0'); ctxM.fill(); 
  }
  
  if(!state.scoreMode) {
    const HAND_BONES=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20]];
    ['L','R'].forEach(side=>{ 
      const lm=state.rawLandmarks[side]; 
      if(lm){ 
        const colBase=side==='L'?(isNight?'#f5b922':'#ba7500'):(isNight?'#22b9f5':'#007cb8'); ctxM.save(); ctxM.strokeStyle=colBase; ctxM.lineWidth=1.2; 
        HAND_BONES.forEach(([bA,bB])=>{ const ptA=lm[bA], ptB=lm[bB]; if(ptA&&ptB){ ctxM.beginPath(); ctxM.moveTo((1-ptA.x)*W,ptA.y*H); ctxM.lineTo((1-ptB.x)*W,ptB.y*H); ctxM.globalAlpha=0.10; ctxM.stroke(); } }); ctxM.restore(); 
      } 
    });
  }
  
  ctxUi.clearRect(0,0,W,H); 
  if(!state.scoreMode) {
    ['L','R'].forEach(side=>{ 
      const col=side==='L'?(isNight?'#f5b922':'#ba7500'):(isNight?'#22b9f5':'#007cb8'); 
      handPos[side].forEach(f=>{ ctxUi.beginPath(); ctxUi.arc(f.sx,f.sy,7,0,Math.PI*2); ctxUi.fillStyle=col; ctxUi.fill(); }); 
    });
  }
  drawScope(); 
}

// UI Controls & Recorder Native Export
const recBtn=document.getElementById('rec-btn'), dlBtn=document.getElementById('dl-btn'), recTimer=document.getElementById('rec-timer');

recBtn.addEventListener('click',()=>{ 
  ensureAudio(); 
  if(state.isRecordingLoop){ 
    state.isRecordingLoop=false; 
    recBtn.textContent='⏺ REC'; 
    recBtn.classList.remove('rec-on'); 
    recTimer.textContent=''; 
    if (mediaRecorder && mediaRecorder.state !== 'inactive') { mediaRecorder.stop(); }
    showToast('Procesando master estéreo...'); 
  } else { 
    state.isRecordingLoop=true; 
    recBtn.textContent='⏹ STOP'; 
    recBtn.classList.add('rec-on'); 
    recTimer.textContent='REC'; 
    
    recordedChunks = [];
    mediaRecorder = new MediaRecorder(recDest.stream, { mimeType: 'audio/webm' });
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      const blob = new Blob(recordedChunks, { type: 'audio/webm' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `DJSTROMA_Take_${Date.now()}.webm`;
      a.click();
    };
    mediaRecorder.start();
    showToast('Capturando señal pura estéreo...'); 
  } 
});

dlBtn.addEventListener('click',()=>{ state.loopEvents=[]; dlBtn.style.display='none'; showToast('Secuenciador limpio'); });
let isMuted=false; document.getElementById('mute-btn').addEventListener('click',()=>{ ensureAudio(); isMuted=!isMuted; masterGain.gain.setTargetAtTime(isMuted?0:state.vol,ctx.currentTime,.06); const btn=document.getElementById('mute-btn'); btn.textContent=isMuted?'🔇':'VOL'; btn.classList.toggle('on',isMuted); });
document.getElementById('scale-sel').addEventListener('change',e=>{ state.scale=e.target.value; buildZones(); showToast('Afinación Justa: '+e.target.value); });
document.getElementById('style-sel').addEventListener('change',e=>{ state.style=e.target.value; buildZones(); showToast('Módulo de Timbres: '+e.target.value); });
document.getElementById('bpm-sel').addEventListener('change',e=>{ state.bpm=parseInt(e.target.value); state.loopDuration=(60/state.bpm)*state.loopBeats; showToast('Tempo: '+e.target.value+' BPM'); });
const themeBtn=document.getElementById('theme-btn'); themeBtn.addEventListener('click',()=>{ state.theme=state.theme==='night'?'day':'night'; document.body.dataset.theme=state.theme; themeBtn.textContent=state.theme==='night'?'☀':'🌙'; });
document.getElementById('freq-btn').addEventListener('click',()=>{ ensureAudio(); document.getElementById('freq-modal').classList.add('open'); });
document.getElementById('freq-close').addEventListener('click',()=>{ document.getElementById('freq-modal').classList.remove('open'); });

function updateSliderPct(el){ const pct=((el.value-el.min)/(el.max-el.min)*100).toFixed(1)+'%'; el.style.setProperty('--pct',pct); }
const freqSl=document.getElementById('freq-sl'), volSl=document.getElementById('vol-sl'), octSl=document.getElementById('oct-sl');
freqSl.addEventListener('input',()=>{ state.baseFreq=parseFloat(freqSl.value); document.getElementById('freq-disp').textContent=`${freqSl.value} Hz`; updateSliderPct(freqSl); buildZones(); });
volSl.addEventListener('input',()=>{ state.vol=parseInt(volSl.value)/100; document.getElementById('vol-disp').textContent=volSl.value+'%'; if(masterGain&&!isMuted) masterGain.gain.setTargetAtTime(state.vol,ctx.currentTime,.05); updateSliderPct(volSl); });
octSl.addEventListener('input',()=>{ state.baseOct=parseInt(octSl.value); document.getElementById('oct-disp').textContent='Octava '+octSl.value; updateSliderPct(octSl); buildZones(); });
document.getElementById('vinyl-chk').addEventListener('change',e=>{ state.vinyl=e.target.checked; });

[freqSl,volSl,octSl].forEach(updateSliderPct);
let toastT=null; function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2500); }

['click','touchstart'].forEach(ev=>{ document.addEventListener(ev,()=>{ ensureAudio(); if(ctx?.state==='suspended') ctx.resume(); },{once:true,passive:true}); });
window.addEventListener('load',()=>{ resize(); requestAnimationFrame(render); setTimeout(initMediaPipe,400); });
</script>
