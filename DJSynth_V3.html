<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SOUNDGO · MIXTURA V3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
/* ───────────────────────────────────────
   DESIGN TOKENS — Night / Day
   ─────────────────────────────────────── */
:root {
  --bg:        #0b0c0e;
  --surface:   #13161a;
  --surface2:  #1c2029;
  --border:    #2a2f3a;
  --text:      #e8eaf0;
  --text-dim:  #5a6070;
  --text-mid:  #9aa0b0;
  --left:      #f0c040;
  --left-glow: rgba(240,192,64,0.5);
  --left-dim:  rgba(240,192,64,0.12);
  --right:     #40c8f0;
  --right-glow:rgba(64,200,240,0.5);
  --right-dim: rgba(64,200,240,0.12);
  --bg-trail:  rgba(11,12,14,0.28);
  --shadow:    0 2px 20px rgba(0,0,0,0.8);
  --radius:    10px;
  --radius-sm: 6px;
}
[data-theme="day"] {
  --bg:        #f0ece3;
  --surface:   #ffffff;
  --surface2:  #e4dfd6;
  --border:    #c8c3b8;
  --text:      #111214;
  --text-dim:  #888070;
  --text-mid:  #555050;
  --left:      #b87800;
  --left-glow: rgba(184,120,0,0.4);
  --left-dim:  rgba(184,120,0,0.10);
  --right:     #006ea8;
  --right-glow:rgba(0,110,168,0.4);
  --right-dim: rgba(0,110,168,0.10);
  --bg-trail:  rgba(240,236,227,0.30);
}

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html, body {
  width:100%; height:100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size:13px;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: none;
}

/* ── MAIN CANVAS STACK ── */
#canvas-bg,
#canvas-main,
#canvas-ui {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
}
#canvas-bg   { z-index: 1; }  /* video + bleed */
#canvas-main { z-index: 2; }  /* particles, trails, polygon mesh */
#canvas-ui   { z-index: 3; pointer-events:none; } /* labels overlay */

/* ── HUD HEADER ── */
#hud {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 14px;
  height: 48px;
  background: linear-gradient(to bottom, rgba(11,12,14,0.88) 60%, transparent);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
[data-theme="day"] #hud {
  background: linear-gradient(to bottom, rgba(240,236,227,0.92) 60%, transparent);
}
#wordmark {
  font-family: 'Syne', sans-serif;
  font-size: 17px;
  font-weight: 800;
  letter-spacing: .5px;
  color: var(--text);
  white-space: nowrap;
  flex-shrink: 0;
}
#wordmark em { color: var(--left); font-style:normal; }
.h-sep { width:1px; height:20px; background:var(--border); flex-shrink:0; }
.spacer { flex:1; }

.hctl { display:flex; align-items:center; gap:6px; flex-shrink:0; }
.hctl label { font-size:10px; letter-spacing:.08em; color:var(--text-dim); white-space:nowrap; }

select {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size:11px;
  padding: 3px 6px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
  min-width: 88px;
}
select:focus { outline:none; border-color:var(--left); }
select option { background: var(--surface); }

.pill {
  display:inline-flex; align-items:center; gap:4px;
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: rgba(255,255,255,0.04);
  color: var(--text-mid);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  cursor: pointer;
  white-space: nowrap;
  transition: background .12s, border-color .12s, color .12s;
  flex-shrink: 0;
}
.pill:hover { background: rgba(255,255,255,0.10); color: var(--text); }
.pill.on { background: var(--left); color: var(--bg); border-color: var(--left); }
.pill.rec-on { background: #e03030; color:#fff; border-color:#e03030; animation: recpulse 1s infinite; }
@keyframes recpulse { 0%,100%{opacity:1} 50%{opacity:.6} }

/* ── STATUS BAR ── */
#statusbar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 14px;
  height: 36px;
  background: linear-gradient(to top, rgba(11,12,14,0.88) 60%, transparent);
  border-top: 1px solid rgba(255,255,255,0.06);
}
[data-theme="day"] #statusbar {
  background: linear-gradient(to top, rgba(240,236,227,0.92) 60%, transparent);
}
#cam-indicator { display:flex; align-items:center; gap:5px; }
.cam-dot { width:6px; height:6px; border-radius:50%; background:var(--text-dim); }
.cam-dot.ok   { background:#3a3; }
.cam-dot.err  { background:#d33; }
.cam-dot.wait { background:#a80; animation:blink .8s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.cam-lbl { font-size:10px; color:var(--text-dim); }

#scope-wrap { flex:1; height:22px; overflow:hidden; }
#scope { width:100%; height:100%; display:block; }
#vu { width:56px; height:5px; background:var(--surface2); border-radius:3px; overflow:hidden; flex-shrink:0; }
#vu-fill { height:100%; width:0; background:linear-gradient(90deg,#3a3,#f0c040,#d33); border-radius:3px; transition:width .05s; }
#rec-timer { color:#e03030; font-size:11px; min-width:36px; }

/* ── HUD READOUTS (chord / note display) ── */
#readout-left, #readout-right {
  position: fixed;
  top: 56px;
  z-index: 9;
  display: flex;
  flex-direction: column;
  gap: 2px;
  pointer-events: none;
}
#readout-left  { left: 14px; }
#readout-right { right: 14px; align-items: flex-end; }
.readout-tag {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: .12em;
  text-transform: uppercase;
  opacity: .55;
}
#readout-left  .readout-tag  { color: var(--left); }
#readout-right .readout-tag  { color: var(--right); }
.readout-chord {
  font-family: 'Syne', sans-serif;
  font-size: 28px;
  font-weight: 800;
  line-height: 1;
  letter-spacing: -.02em;
  transition: opacity .15s;
}
#readout-left  .readout-chord { color: var(--left);  text-shadow: 0 0 30px var(--left-glow); }
#readout-right .readout-chord { color: var(--right); text-shadow: 0 0 30px var(--right-glow); }
.readout-info { font-size:10px; color:var(--text-dim); letter-spacing:.06em; }

/* ── MODAL ── */
#freq-modal {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.72); z-index:200;
  align-items:center; justify-content:center; backdrop-filter:blur(4px);
}
#freq-modal.open { display:flex; }
#freq-box {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:20px 24px;
  width:min(340px,90vw);
  display:flex; flex-direction:column; gap:12px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6);
}
#freq-box h3 { font-family:'Syne',sans-serif; font-size:15px; font-weight:800; }
.slider-row { display:flex; flex-direction:column; gap:4px; }
.slider-row label { font-size:11px; color:var(--text-dim); }
input[type=range] {
  width:100%; cursor:pointer;
  appearance:none; -webkit-appearance:none;
  height:5px;
  background:linear-gradient(90deg,var(--left) var(--pct,50%),var(--border) var(--pct,50%));
  border-radius:3px; outline:none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; width:17px; height:17px;
  background:var(--text); border-radius:50%; cursor:pointer;
}
input[type=range]::-moz-range-thumb {
  width:17px; height:17px; background:var(--text); border-radius:50%; border:none; cursor:pointer;
}
.slider-val { font-size:12px; color:var(--text); text-align:right; }
.modal-close {
  align-self:flex-end; padding:6px 16px;
  border:1px solid var(--border); border-radius:20px;
  background:var(--surface2); color:var(--text);
  font-family:'DM Mono',monospace; font-size:11px; cursor:pointer;
}
.modal-close:hover { background:rgba(255,255,255,0.08); }

/* ── TOAST ── */
#toast {
  position:fixed; bottom:46px; left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--text); color:var(--bg);
  padding:7px 18px; border-radius:20px;
  font-size:11px; font-weight:500;
  opacity:0; pointer-events:none;
  transition:opacity .2s, transform .2s;
  z-index:999; white-space:nowrap;
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ── ZONE LABELS ── */
#zone-label-l, #zone-label-r {
  position: fixed; top: 50%; transform: translateY(-50%);
  z-index: 8; pointer-events:none;
  font-family: 'Syne', sans-serif;
  font-size: 11px; font-weight: 800;
  letter-spacing: .18em; text-transform: uppercase;
  writing-mode: vertical-rl;
  opacity: .14;
  transition: opacity .4s;
}
#zone-label-l { left: 6px; color: var(--left); }
#zone-label-r { right: 6px; color: var(--right); transform: translateY(-50%) rotate(180deg); }
body.hands-active #zone-label-l,
body.hands-active #zone-label-r { opacity: 0; }

/* hidden video el for mediapipe */
#cam-video { position:fixed; top:-9999px; left:-9999px; width:1px; height:1px; }
</style>
</head>
<body data-theme="night">

<!-- CANVAS STACK -->
<canvas id="canvas-bg"></canvas>
<canvas id="canvas-main"></canvas>
<canvas id="canvas-ui"></canvas>

<!-- hidden video for MediaPipe -->
<video id="cam-video" autoplay playsinline muted></video>

<!-- HUD HEADER -->
<header id="hud">
  <div id="wordmark">SOUND<em>GO</em> · MIXTURA</div>
  <div class="h-sep"></div>

  <div class="hctl">
    <label>SCALE</label>
    <select id="scale-sel">
      <option value="major">C Major</option>
      <option value="minor">A Minor</option>
      <option value="penta_maj">Penta Maj</option>
      <option value="penta_min">Penta Min</option>
    </select>
  </div>
  <div class="hctl">
    <label>TIMBRE</label>
    <select id="style-sel">
      <option value="lofi" selected>Lo-fi</option>
      <option value="steven">Steven U.</option>
      <option value="piano">Piano</option>
      <option value="organ">Organ</option>
      <option value="xylophone">Xylophone</option>
    </select>
  </div>

  <div class="spacer"></div>

  <button class="pill" id="freq-btn">♩ TUNE</button>
  <button class="pill" id="rec-btn">⏺ REC</button>
  <span id="rec-timer"></span>
  <button class="pill" id="dl-btn" style="display:none">⬇ DL</button>
  <button class="pill" id="mute-btn">VOL</button>
  <button class="pill" id="theme-btn">☀</button>
</header>

<!-- HUD READOUTS -->
<div id="readout-left">
  <span class="readout-tag">← CHORDS</span>
  <span class="readout-chord" id="chord-left">—</span>
  <span class="readout-info" id="info-left">left hand</span>
</div>
<div id="readout-right">
  <span class="readout-tag">MELODY →</span>
  <span class="readout-chord" id="chord-right">—</span>
  <span class="readout-info" id="info-right">right hand</span>
</div>

<!-- ZONE LABELS -->
<div id="zone-label-l">CHORDS · LEFT HAND</div>
<div id="zone-label-r">MELODY · RIGHT HAND</div>

<!-- STATUS BAR -->
<footer id="statusbar">
  <div id="cam-indicator">
    <div class="cam-dot wait" id="cam-dot"></div>
    <span class="cam-lbl" id="cam-label">INIT</span>
  </div>
  <div class="h-sep"></div>
  <div id="scope-wrap"><canvas id="scope"></canvas></div>
  <div class="h-sep"></div>
  <div id="vu"><div id="vu-fill"></div></div>
</footer>

<!-- TUNE MODAL -->
<div id="freq-modal">
  <div id="freq-box">
    <h3>Tuning Parameters</h3>
    <div class="slider-row">
      <label>Base frequency</label>
      <input type="range" id="freq-sl" min="80" max="1000" value="261" step="1">
      <div class="slider-val" id="freq-disp">261 Hz — C4</div>
    </div>
    <div class="slider-row">
      <label>Master volume</label>
      <input type="range" id="vol-sl" min="0" max="100" value="70" step="1">
      <div class="slider-val" id="vol-disp">70%</div>
    </div>
    <div class="slider-row">
      <label>Base octave (chords)</label>
      <input type="range" id="oct-sl" min="2" max="6" value="3" step="1">
      <div class="slider-val" id="oct-disp">Octave 3</div>
    </div>
    <label style="display:flex;align-items:center;gap:8px;font-size:12px;cursor:pointer;">
      <input type="checkbox" id="vinyl-chk" style="width:15px;height:15px;accent-color:var(--left)">
      Vinyl noise (Lo-fi)
    </label>
    <button class="modal-close" id="freq-close">Close</button>
  </div>
</div>

<div id="toast"></div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
/* ═══════════════════════════════════════════════════════════════
   SOUNDGO MIXTURA V3  ·  Full-Canvas Instrument
   Atlas / 2025
   ═══════════════════════════════════════════════════════════════
   Architecture:
     · Full-screen canvas rendering  (bg / main / ui layers)
     · Camera video rendered as immersive mirrored background
     · Left half  → Elastic polygon chord mesh (8 sectors × 2 = 16)
     · Right half → Kinetic-orbital melody sequencer (16 note orbs)
     · Continuous finger (X,Y) → BiquadFilter + FM modulation
     · MediaPipe Hands decoupled via rAF throttling
     · Preserved audio engine: SCALES, SYNTH, playNote/stopNote,
       MediaRecorder workflow
   ═══════════════════════════════════════════════════════════════ */

// ─────────────────────────────────────────────
// A. MUSIC THEORY ENGINE  (PRESERVED VERBATIM)
// ─────────────────────────────────────────────
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const SCALES = {
  major:     [0,2,4,5,7,9,11],
  minor:     [0,2,3,5,7,8,10],
  penta_maj: [0,2,4,7,9],
  penta_min: [0,3,5,7,10],
};
const ROMAN = ['I','II','III','IV','V','VI','VII','VIII','IIb','IIIb','Vb','VIb','VIIb','IVadd','IXsus','Vaug'];
const LEFT_DEGREES = [0,1,2,3, 4,5,6,7, 0,2,4,6, 1,3,5,7];

function chordIntervals(degIdx, scaleName, style) {
  const sc=SCALES[scaleName], len=sc.length;
  const r=sc[degIdx%len];
  const t3=sc[(degIdx+2)%len]+((degIdx+2)>=len?12:0);
  const t5=sc[(degIdx+4)%len]+((degIdx+4)>=len?12:0);
  const t7=sc[(degIdx+6)%len]+((degIdx+6)>=len?12:0);
  const t9=sc[((degIdx+8)%len)]+12;
  const norm=x=>{let v=((x-r)%12+12)%12;return v===0?12:v;};
  const n3=norm(t3),n5=norm(t5),n7=norm(t7),n9=((t9-r)%12+12)%12||12;
  if(style==='steven')    return [0,n3,n5,11,14];
  if(style==='lofi')      return [0,n3,n5,n7,n9];
  if(style==='piano')     return [0,n3,n5,n7];
  if(style==='organ')     return [0,7,12,19];
  if(style==='xylophone') return [0,n3,n5];
  return [0,n3,n5];
}
function chordName(degIdx, scaleName, style) {
  const ext={steven:'maj9',lofi:'7/9',piano:'maj7',organ:'5',xylophone:''};
  return (ROMAN[degIdx]||'?')+(ext[style]||'');
}
function freqToNoteName(hz) {
  if(hz<=0) return '—';
  const midi=Math.round(12*Math.log2(hz/440)+69);
  const oct=Math.floor(midi/12)-1;
  return NOTE_NAMES[((midi%12)+12)%12]+oct;
}

// ─────────────────────────────────────────────
// B. STATE
// ─────────────────────────────────────────────
const state = {
  scale:'major', style:'lofi',
  baseFreq:261.63, baseOct:3, vol:0.70,
  vinyl:false, theme:'night',
  camReady:false,
};

// ─────────────────────────────────────────────
// C. AUDIO ENGINE  (PRESERVED VERBATIM)
// ─────────────────────────────────────────────
let ctx=null, masterGain=null, limiter=null, analyserNode=null, recDest=null;
let vinylSrc=null, vinylGain=null;
let activeVoices=new Map();
const MAX_VOICES=10;

const SYNTH={
  steven:   {wave:'sine',    A:.02,D:.3,S:.6,R:.5,spread:2, filt:6000,gain:.18},
  lofi:     {wave:'triangle',A:.05,D:.4,S:.5,R:.4,spread:8, filt:1100,gain:.22},
  piano:    {wave:'triangle',A:.005,D:.8,S:.3,R:.6,spread:1,filt:8000,gain:.25},
  organ:    {wave:'sine',    A:.02,D:.0,S:.9,R:.2,spread:0, filt:4000,gain:.16,harmonics:[1,2,3,4]},
  xylophone:{wave:'sine',    A:.001,D:.2,S:.0,R:.1,spread:0,filt:14000,gain:.32},
};

// Per-voice dynamic filter for continuous modulation
let dynFilter=null;

function ensureAudio() {
  if(ctx) return;
  ctx=new (window.AudioContext||window.webkitAudioContext)();
  masterGain=ctx.createGain(); masterGain.gain.value=state.vol;
  limiter=ctx.createDynamicsCompressor();
  limiter.threshold.value=-3; limiter.knee.value=3;
  limiter.ratio.value=20; limiter.attack.value=.001; limiter.release.value=.1;
  analyserNode=ctx.createAnalyser(); analyserNode.fftSize=256;
  recDest=ctx.createMediaStreamDestination();
  dynFilter=ctx.createBiquadFilter();
  dynFilter.type='lowpass'; dynFilter.frequency.value=4000; dynFilter.Q.value=1.2;

  masterGain.connect(limiter);
  limiter.connect(dynFilter);
  dynFilter.connect(analyserNode);
  analyserNode.connect(ctx.destination);
  analyserNode.connect(recDest);

  const bsz=ctx.sampleRate*2, nb=ctx.createBuffer(1,bsz,ctx.sampleRate);
  const nd=nb.getChannelData(0);
  for(let i=0;i<bsz;i++) nd[i]=(Math.random()*2-1)*0.018;
  vinylSrc=ctx.createBufferSource(); vinylSrc.buffer=nb; vinylSrc.loop=true;
  const nf=ctx.createBiquadFilter(); nf.type='bandpass'; nf.frequency.value=500; nf.Q.value=0.4;
  vinylGain=ctx.createGain(); vinylGain.gain.value=0;
  vinylSrc.connect(nf); nf.connect(vinylGain); vinylGain.connect(masterGain);
  vinylSrc.start();
}

function playNote(key, freq) {
  if(!ctx) return;
  if(activeVoices.size>=MAX_VOICES) {
    const oldest=activeVoices.keys().next().value;
    stopNote(oldest);
  }
  stopNote(key);
  const p=SYNTH[state.style], now=ctx.currentTime, nodes=[];
  (p.harmonics||[1]).forEach((h,hi)=>{
    const osc=ctx.createOscillator();
    const env=ctx.createGain();
    const flt=ctx.createBiquadFilter();
    flt.type='lowpass'; flt.frequency.value=p.filt;
    osc.type=p.wave; osc.frequency.value=freq*h;
    osc.detune.value=(Math.random()-.5)*p.spread*2;
    const g=p.gain/(hi+1)/(p.harmonics||[1]).length;
    env.gain.setValueAtTime(0,now);
    env.gain.linearRampToValueAtTime(g,now+p.A);
    env.gain.linearRampToValueAtTime(g*p.S,now+p.A+p.D);
    osc.connect(env); env.connect(flt); flt.connect(masterGain);
    osc.start(now); nodes.push({osc,env,flt});
  });
  if(state.style==='steven') {
    const mod=ctx.createOscillator(), mg=ctx.createGain();
    mod.frequency.value=freq*2.01; mg.gain.value=freq*0.3;
    mod.connect(mg);
    if(nodes[0]) mg.connect(nodes[0].osc.frequency);
    mod.start(now); mod.stop(now+3);
    nodes.push({osc:mod,env:mg,flt:null});
  }
  activeVoices.set(key,{nodes,p,g:p.gain});
  if(vinylGain) {
    const want=(state.vinyl&&state.style==='lofi')?0.12:0;
    vinylGain.gain.setTargetAtTime(want,now,.1);
  }
}
function stopNote(key) {
  const v=activeVoices.get(key);
  if(!v) return;
  const now=ctx.currentTime, p=v.p;
  v.nodes.forEach(({osc,env})=>{
    if(!env) return;
    try{
      env.gain.cancelScheduledValues(now);
      env.gain.setValueAtTime(env.gain.value,now);
      env.gain.linearRampToValueAtTime(0,now+(p.R||.3));
      osc.stop(now+(p.R||.3)+.05);
    }catch(e){}
  });
  activeVoices.delete(key);
}
function stopAllNotes() { activeVoices.forEach((_,k)=>stopNote(k)); }

function playChord(degIdx, fingerIdx) {
  const sc=SCALES[state.scale];
  const root=sc[degIdx%sc.length];
  const rootFreq=state.baseFreq*Math.pow(2,(root+(state.baseOct-4)*12)/12);
  const ivals=chordIntervals(degIdx,state.scale,state.style);
  ivals.forEach((semi,i)=>{
    playNote(`L_${fingerIdx}_${i}`, rootFreq*Math.pow(2,semi/12));
  });
}
function playMelodyNote(noteIdx, fingerIdx) {
  if(!ctx) return;
  const sc=SCALES[state.scale], notesPerOct=sc.length;
  const oct=Math.floor(noteIdx/notesPerOct), step=noteIdx%notesPerOct;
  const semi=sc[step]+oct*12;
  const freq=state.baseFreq*Math.pow(2,(semi+state.baseOct*12-4*12+12)/12);
  playNote(`R_${fingerIdx}`,freq);
}

// Continuous modulation from finger position
function modulateFromFingers(lFingers, rFingers) {
  if(!dynFilter || !ctx) return;
  const now = ctx.currentTime;
  // Left hand Y → filter cutoff (100Hz–8000Hz)
  if(lFingers.length) {
    const avgY = lFingers.reduce((s,f)=>s+f.y,0)/lFingers.length;
    const cutoff = 200 + (1-avgY) * 7800; // top = bright
    dynFilter.frequency.setTargetAtTime(Math.max(100,Math.min(18000,cutoff)), now, 0.05);
  }
  // Right hand X → FM modulation depth (steven style)
  // (visual feedback only for other styles — still timbral)
}

// D. CANVAS SETUP
// ─────────────────────────────────────────────
const cvBg   = document.getElementById('canvas-bg');
const cvMain = document.getElementById('canvas-main');
const cvUi   = document.getElementById('canvas-ui');

const ctxM   = cvMain.getContext('2d');

// ─────────────────────────────────────────────
// E. ZONE GEOMETRY
// ─────────────────────────────────────────────
// Left half  = chords  (elastic polygon mesh)
// Right half = melody  (kinetic orbital sequencer)
let chordZones = [];   // [{cx,cy,r,degIdx,label,noteFreq, animR, animPhase}]
let melodyOrbs = [];   // [{cx,cy,r,noteIdx,label,freq, x,y,vx,vy, trail[]}]

const CHORD_COUNT  = 16; // 4×4 logical, arranged as 4-ring radial
const MELODY_COUNT = 16;

function buildZones() {
  chordZones = [];
  melodyOrbs = [];

  const LW = W * 0.5;
  const sc = SCALES[state.scale];

  // ── CHORD ZONES: 2 concentric rings of 8 ──
  const ringDefs = [
    { count:8, rRing: Math.min(LW*0.38, H*0.32), startDegIdx:0 },
    { count:8, rRing: Math.min(LW*0.20, H*0.17), startDegIdx:8 },
  ];
  let zIdx = 0;
  ringDefs.forEach(ring => {
    for(let i=0;i<ring.count;i++) {
      const angle = (i/ring.count)*Math.PI*2 - Math.PI/2;
      const cx = LW*0.5 + Math.cos(angle)*ring.rRing;
      const cy = H*0.5  + Math.sin(angle)*ring.rRing;
      const r  = ring.rRing*0.22 + 10;
      const degIdx = LEFT_DEGREES[zIdx % LEFT_DEGREES.length];
      const rootHz = state.baseFreq*Math.pow(2,(sc[degIdx%sc.length]+(state.baseOct-4)*12)/12);
      chordZones.push({
        cx, cy, r,
        degIdx, zIdx,
        label: chordName(degIdx,state.scale,state.style),
        noteFreq: rootHz,
        animR: r,
        animPhase: Math.random()*Math.PI*2,
        active: false,
        glow: 0,
        fingerIds: new Set(),
      });
      zIdx++;
    }
  });

  // ── MELODY ORBS: floating in right half ──
  const RX0 = W * 0.5;
  const RW  = W * 0.5;
  for(let i=0;i<MELODY_COUNT;i++){
    const step = i % sc.length;
    const oct  = Math.floor(i/sc.length);
    const semi = sc[step] + oct*12;
    const freq = state.baseFreq*Math.pow(2,(semi+state.baseOct*12-4*12+12)/12);

    // Random initial positions distributed across right half
    const angle = (i/MELODY_COUNT)*Math.PI*2;
    const dist  = 0.15 + Math.random()*0.28;
    const cx0   = RX0 + RW*0.5 + Math.cos(angle)*RW*dist;
    const cy0   = H*0.5 + Math.sin(angle)*H*dist*0.7;

    const speed = 0.4 + Math.random()*0.5;
    const dir   = Math.random()*Math.PI*2;

    melodyOrbs.push({
      cx: cx0, cy: cy0,
      r:  12 + (oct===0 ? 4 : 0),
      noteIdx: i,
      label: freqToNoteName(freq).replace(/[0-9]/g,''),
      freq,
      x: cx0, y: cy0,
      vx: Math.cos(dir)*speed,
      vy: Math.sin(dir)*speed,
      baseX: cx0, baseY: cy0,
      trail: [],
      active: false,
      glow: 0,
      lastTrigger: -9999,
      fingerIds: new Set(),
    });
  }
}

// ─────────────────────────────────────────────
// F. PARTICLES  (fingertip emission)
// ─────────────────────────────────────────────
const particles = [];
function emitParticles(x, y, color, n=6, burst=false) {
  for(let i=0;i<n;i++){
    const angle = Math.random()*Math.PI*2;
    const spd   = burst ? 2+Math.random()*4 : 0.5+Math.random()*1.5;
    particles.push({
      x, y,
      vx: Math.cos(angle)*spd,
      vy: Math.sin(angle)*spd,
      life: 1.0,
      decay: burst ? 0.025+Math.random()*0.025 : 0.012+Math.random()*0.012,
      r: burst ? 3+Math.random()*4 : 2+Math.random()*3,
      color,
    });
  }
}

// ─────────────────────────────────────────────
// G. HAND STATE  (input from MediaPipe + touch)
// ─────────────────────────────────────────────
// Normalized [0..1] finger positions per side
const handPos = {
  L: [], // [{x,y,tipId,fi}]
  R: [],
};
const fingerState = {}; // key `${side}_F${fi}` → lastZoneIdx

// FINGERTIP_IDS
const FINGERTIP_IDS = [4,8,12,16,20];

// Map normalized coords to screen
function normToScreen(nx, ny) {
  // video is mirrored: flip X
  return { sx: (1-nx)*W, sy: ny*H };
}

// ─────────────────────────────────────────────
// H. INTERACTION LOGIC
// ─────────────────────────────────────────────
function processHandInputs() {
  const colLeft  = '#f0c040';
  const colRight = '#40c8f0';

  ['L','R'].forEach(side => {
    const fingers = handPos[side];
    const color   = side==='L' ? colLeft : colRight;

    if(!fingers.length) {
      // Release all on this side
      FINGERTIP_IDS.forEach((_,fi)=>{
        const fkey = `${side}_F${fi}`;
        const prev = fingerState[fkey];
        if(prev !== undefined && prev >= 0) {
          if(side==='L') {
            for(let i=0;i<6;i++) stopNote(`L_${fi}_${i}`);
            if(chordZones[prev]) chordZones[prev].fingerIds.delete(fi);
          } else {
            stopNote(`R_${fi}`);
            if(melodyOrbs[prev]) melodyOrbs[prev].fingerIds.delete(fi);
          }
          fingerState[fkey] = -1;
        }
      });
      return;
    }

    fingers.forEach(f => {
      const {sx, sy, fi} = f;
      const fkey = `${side}_F${fi}`;
      const prev = fingerState[fkey] ?? -1;

      emitParticles(sx, sy, color, 1);

      if(side==='L') {
        // Find nearest chord zone
        let best=-1, bestD=Infinity;
        chordZones.forEach((z,i)=>{
          const d=Math.hypot(sx-z.cx, sy-z.cy);
          if(d < z.r*1.6 && d < bestD) { bestD=d; best=i; }
        });

        if(best !== prev) {
          if(prev>=0) {
            for(let i=0;i<6;i++) stopNote(`L_${fi}_${i}`);
            chordZones[prev]?.fingerIds.delete(fi);
          }
          fingerState[fkey] = best;
          if(best>=0) {
            ensureAudio();
            chordZones[best].fingerIds.add(fi);
            playChord(chordZones[best].degIdx, fi);
            document.getElementById('chord-left').textContent =
              chordName(chordZones[best].degIdx, state.scale, state.style);
            emitParticles(sx,sy,color,10,true);
            if(navigator.vibrate) navigator.vibrate(15);
          }
        }
      } else {
        // Find nearest melody orb
        let best=-1, bestD=Infinity;
        melodyOrbs.forEach((o,i)=>{
          const d=Math.hypot(sx-o.x, sy-o.y);
          if(d < o.r*2.5 && d < bestD) { bestD=d; best=i; }
        });

        if(best !== prev) {
          if(prev>=0) {
            stopNote(`R_${fi}`);
            melodyOrbs[prev]?.fingerIds.delete(fi);
          }
          fingerState[fkey] = best;
          if(best>=0) {
            ensureAudio();
            melodyOrbs[best].fingerIds.add(fi);
            playMelodyNote(melodyOrbs[best].noteIdx, fi);
            document.getElementById('chord-right').textContent = melodyOrbs[best].label;
            melodyOrbs[best].lastTrigger = performance.now();
            emitParticles(sx,sy,colRight,10,true);
            if(navigator.vibrate) navigator.vibrate(12);
          }
        }
      }
    });
  });

  // Update active flags
  chordZones.forEach(z => { z.active = z.fingerIds.size > 0; });
  melodyOrbs.forEach(o => { o.active = o.fingerIds.size > 0; });

  // Continuous modulation
  const lScreenFingers = handPos.L.map(f=>({x:f.sx/W, y:f.sy/H}));
  modulateFromFingers(lScreenFingers, []);
}

// Touch / mouse fallback
const touchState = new Map(); // pointerId → {side, fi}
cvMain.addEventListener('pointerdown', handlePointerDown, {passive:false});
cvMain.addEventListener('pointermove', handlePointerMove, {passive:false});
cvMain.addEventListener('pointerup',   handlePointerEnd,  {passive:false});
cvMain.addEventListener('pointercancel',handlePointerEnd, {passive:false});

function pointerSide(x) { return x < W*0.5 ? 'L' : 'R'; }
function ptrToNorm(e) { return { nx: e.clientX/W, ny: e.clientY/H }; }

let ptrFiCounter = 0; // pseudo finger index for touch
const ptrFiMap = new Map(); // pointerId → fi

function handlePointerDown(e) {
  e.preventDefault();
  ensureAudio();
  if(!ptrFiMap.has(e.pointerId)) {
    ptrFiMap.set(e.pointerId, ptrFiCounter++ % 5);
  }
  updatePointerInput(e);
}
function handlePointerMove(e) {
  if(e.buttons === 0) return;
  e.preventDefault();
  updatePointerInput(e);
}
function handlePointerEnd(e) {
  e.preventDefault();
  const fi = ptrFiMap.get(e.pointerId) ?? 0;
  const side = pointerSide(e.clientX);
  const fkey = `${side}_F${fi}`;
  const prev = fingerState[fkey] ?? -1;
  if(prev>=0) {
    if(side==='L') {
      for(let i=0;i<6;i++) stopNote(`L_${fi}_${i}`);
      chordZones[prev]?.fingerIds.delete(fi);
    } else {
      stopNote(`R_${fi}`);
      melodyOrbs[prev]?.fingerIds.delete(fi);
    }
    fingerState[fkey] = -1;
  }
  // Remove from handPos
  handPos.L = handPos.L.filter(f=>f.fi!==fi);
  handPos.R = handPos.R.filter(f=>f.fi!==fi);
  ptrFiMap.delete(e.pointerId);
}

function updatePointerInput(e) {
  const fi   = ptrFiMap.get(e.pointerId) ?? 0;
  const side = pointerSide(e.clientX);
  const sx   = e.clientX, sy = e.clientY;

  // Update handPos for this fi+side
  ['L','R'].forEach(s => { handPos[s] = handPos[s].filter(f=>!(f.fi===fi)); });
  handPos[side].push({sx, sy, fi});
}

// ─────────────────────────────────────────────
// I. ELASTIC POLYGON MESH  (left zone visual)
// ─────────────────────────────────────────────
// Node-spring network connecting chord zones
const meshNodes   = []; // {x,y,vx,vy,ox,oy}
const meshEdges   = []; // [i,j]
const MESH_ROWS = 7, MESH_COLS = 5;

function buildMesh() {
  meshNodes.length = 0; meshEdges.length = 0;
  const LW = W*0.5;
  const pad = 40;
  for(let r=0;r<MESH_ROWS;r++) {
    for(let c=0;c<MESH_COLS;c++) {
      const ox = pad + (LW-pad*2) * (c/(MESH_COLS-1));
      const oy = 60 + (H-120)    * (r/(MESH_ROWS-1));
      meshNodes.push({x:ox, y:oy, vx:0, vy:0, ox, oy});
    }
  }
  // Horizontal + vertical edges
  for(let r=0;r<MESH_ROWS;r++) {
    for(let c=0;c<MESH_COLS;c++) {
      const i = r*MESH_COLS+c;
      if(c<MESH_COLS-1) meshEdges.push([i,i+1]);
      if(r<MESH_ROWS-1) meshEdges.push([i,i+MESH_COLS]);
      if(c<MESH_COLS-1&&r<MESH_ROWS-1) meshEdges.push([i,i+MESH_COLS+1]);
    }
  }
}

function updateMesh() {
  const allFingers = [...handPos.L];
  const stiffness = 0.06, damping = 0.88;

  meshNodes.forEach(n=>{
    // Spring toward rest
    let fx = (n.ox - n.x)*stiffness;
    let fy = (n.oy - n.y)*stiffness;

    // Repulsion from active fingers
    allFingers.forEach(f=>{
      const dx = n.x - f.sx, dy = n.y - f.sy;
      const d  = Math.hypot(dx,dy)+1;
      if(d < 120) {
        const force = (120-d)*(120-d)*0.0004;
        fx += (dx/d)*force;
        fy += (dy/d)*force;
      }
    });
    // Active chord zone attraction pulse
    chordZones.forEach(z=>{
      if(z.active) {
        const dx=n.x-z.cx, dy=n.y-z.cy;
        const d=Math.hypot(dx,dy)+1;
        if(d<90) {
          const force=(90-d)*0.0006;
          fx+=(-dx/d)*force;
          fy+=(-dy/d)*force;
        }
      }
    });

    n.vx = (n.vx + fx)*damping;
    n.vy = (n.vy + fy)*damping;
    n.x += n.vx;
    n.y += n.vy;
  });
}

// ─────────────────────────────────────────────
// J. ORBITAL PARTICLE SYSTEM  (right zone)
// ─────────────────────────────────────────────
const MELODY_PARTICLES = [];
const MAX_MELODY_PARTS = 80;

function emitMelodyParticle(orb) {
  if(MELODY_PARTICLES.length >= MAX_MELODY_PARTS) return;
  const speed = 1.5 + Math.random()*2;
  const angle = Math.random()*Math.PI*2;
  MELODY_PARTICLES.push({
    x: orb.x, y: orb.y,
    vx: Math.cos(angle)*speed,
    vy: Math.sin(angle)*speed,
    life:1.0, decay:0.018+Math.random()*0.012,
    r: 3+Math.random()*5,
    orb,
  });
}

function updateMelodyOrbs(dt) {
  const RX0 = W * 0.5;
  melodyOrbs.forEach((o,i) => {
    if(o.active) {
      // When active, orbit finger
      const fingers = handPos.R;
      if(fingers.length) {
        const f = fingers[i % fingers.length];
        const tx = f.sx, ty = f.sy;
        o.vx += (tx - o.x)*0.04;
        o.vy += (ty - o.y)*0.04;
        o.vx *= 0.85; o.vy *= 0.85;
      }
    } else {
      // Gentle Brownian drift within right half
      o.vx += (Math.random()-.5)*0.08;
      o.vy += (Math.random()-.5)*0.08;
      // Weak gravity toward base position
      o.vx += (o.baseX - o.x)*0.0012;
      o.vy += (o.baseY - o.y)*0.0012;
      o.vx *= 0.98; o.vy *= 0.98;
    }
    o.x += o.vx; o.y += o.vy;

    // Bounce off right-half boundaries
    const pad = 30;
    if(o.x < RX0+pad)    { o.x = RX0+pad;    o.vx = Math.abs(o.vx)*0.8; }
    if(o.x > W-pad)      { o.x = W-pad;       o.vx = -Math.abs(o.vx)*0.8; }
    if(o.y < 60+pad)     { o.y = 60+pad;      o.vy = Math.abs(o.vy)*0.8; }
    if(o.y > H-50-pad)   { o.y = H-50-pad;    o.vy = -Math.abs(o.vy)*0.8; }

    // Trail
    o.trail.push({x:o.x, y:o.y});
    if(o.trail.length > 28) o.trail.shift();

    // Glow decay
    o.glow = Math.max(0, o.glow - 0.03);
    if(o.active) o.glow = Math.min(1, o.glow + 0.12);

    // Collision with boundary → trigger sound
    const justBounced = (o.x<=RX0+pad+2||o.x>=W-pad-2||o.y<=60+pad+2||o.y>=H-50-pad-2);
    const now = performance.now();
    if(justBounced && !o.active && (now - o.lastTrigger)>400) {
      o.lastTrigger = now;
      ensureAudio();
      playMelodyNote(o.noteIdx, 90+i);
      document.getElementById('chord-right').textContent = o.label;
      o.glow = 1;
      emitMelodyParticle(o);
      emitMelodyParticle(o);
    }
  });

  // Update orbital particles
  for(let i=MELODY_PARTICLES.length-1;i>=0;i--) {
    const p=MELODY_PARTICLES[i];
    p.x+=p.vx; p.y+=p.vy;
    p.vy+=0.04; // gravity
    p.life-=p.decay;
    if(p.life<=0) MELODY_PARTICLES.splice(i,1);
  }
}

// ─────────────────────────────────────────────
// K. CAMERA / VIDEO BACKGROUND
// ─────────────────────────────────────────────
const camVideo = document.getElementById('cam-video');
let camStream  = null;
let isNight    = () => document.body.dataset.theme !== 'day';

// ─────────────────────────────────────────────
// L. RENDER LOOP
// ─────────────────────────────────────────────
let lastRenderTs = 0;
let frameCount = 0;

function render(ts) {
  requestAnimationFrame(render);
  const dt = ts - lastRenderTs;
  lastRenderTs = ts;
  frameCount++;

  processHandInputs();
  updateMesh();
  updateMelodyOrbs(dt);

  // ── BG LAYER: video mirror + trail fade ──
  ctxBg.clearRect(0,0,W,H);

  // Base dark fill
  ctxBg.fillStyle = isNight() ? '#0b0c0e' : '#f0ece3';
  ctxBg.fillRect(0,0,W,H);

  // Video frame
  if(state.camReady && camVideo.readyState>=2) {
    ctxBg.save();
    ctxBg.translate(W,0);
    ctxBg.scale(-1,1);
    ctxBg.globalAlpha = isNight() ? 0.18 : 0.12;
    ctxBg.drawImage(camVideo, 0, 0, W, H);
    ctxBg.restore();
    ctxBg.globalAlpha = 1;
  }

  // Dividing glow line
  const divX = W*0.5;
  const divGrad = ctxBg.createLinearGradient(divX-2,0,divX+2,0);
  if(isNight()) {
    divGrad.addColorStop(0,'rgba(240,192,64,0.0)');
    divGrad.addColorStop(0.5,'rgba(240,192,64,0.18)');
    divGrad.addColorStop(1,'rgba(64,200,240,0.0)');
  } else {
    divGrad.addColorStop(0,'rgba(184,120,0,0.0)');
    divGrad.addColorStop(0.5,'rgba(184,120,0,0.10)');
    divGrad.addColorStop(1,'rgba(0,110,168,0.0)');
  }
  ctxBg.fillStyle = divGrad;
  ctxBg.fillRect(divX-1, 60, 2, H-110);

  // ── MAIN LAYER: trails fade overlay ──
  ctxM.fillStyle = isNight() ? 'rgba(11,12,14,0.28)' : 'rgba(240,236,227,0.30)';
  ctxM.fillRect(0,0,W,H);

  // ── DRAW MESH (left zone) ──
  const meshAlpha = isNight() ? 0.14 : 0.10;
  ctxM.strokeStyle = isNight()
    ? `rgba(240,192,64,${meshAlpha})`
    : `rgba(184,120,0,${meshAlpha})`;
  ctxM.lineWidth = 0.7;
  meshEdges.forEach(([a,b])=>{
    const na=meshNodes[a], nb=meshNodes[b];
    ctxM.beginPath();
    ctxM.moveTo(na.x,na.y);
    ctxM.lineTo(nb.x,nb.y);
    ctxM.stroke();
  });

  // ── CHORD ZONES ──
  const tNow = ts * 0.001;
  chordZones.forEach((z,i)=>{
    const ring = i < 8 ? 0 : 1;
    const pulse = z.active
      ? z.r*(1 + 0.18*Math.sin(tNow*8+z.animPhase))
      : z.r*(0.92 + 0.08*Math.sin(tNow*1.2+z.animPhase));

    // Glow
    if(z.active) z.glow = Math.min(1, z.glow+0.08);
    else          z.glow = Math.max(0, z.glow-0.04);

    // Outer glow ring
    if(z.glow > 0.01) {
      const grd = ctxM.createRadialGradient(z.cx,z.cy,pulse*0.6, z.cx,z.cy,pulse*2.8);
      const col = isNight() ? '240,192,64' : '184,120,0';
      grd.addColorStop(0,`rgba(${col},${z.glow*0.4})`);
      grd.addColorStop(1,`rgba(${col},0)`);
      ctxM.beginPath();
      ctxM.arc(z.cx,z.cy,pulse*2.8,0,Math.PI*2);
      ctxM.fillStyle=grd;
      ctxM.fill();
    }

    // Core circle
    const col = isNight() ? '240,192,64' : '184,120,0';
    ctxM.beginPath();
    ctxM.arc(z.cx,z.cy,pulse,0,Math.PI*2);
    ctxM.strokeStyle = z.active
      ? `rgba(${col},${0.7+z.glow*0.3})`
      : `rgba(${col},${0.2+ring*0.05})`;
    ctxM.lineWidth = z.active ? 2 : 1;
    ctxM.stroke();

    if(z.active) {
      ctxM.fillStyle = `rgba(${col},0.12)`;
      ctxM.fill();
    }

    // Label
    const labelAlpha = z.active ? 1.0 : 0.45 - ring*0.12;
    ctxM.font = `${z.active?700:500} ${z.active?13:11}px 'Syne', sans-serif`;
    ctxM.fillStyle = `rgba(${col},${labelAlpha})`;
    ctxM.textAlign = 'center';
    ctxM.textBaseline = 'middle';
    ctxM.fillText(z.label, z.cx, z.cy);

    // Connecting lines from active zones to chord center
    if(z.active) {
      const cx0=W*0.25, cy0=H*0.5;
      ctxM.beginPath();
      ctxM.moveTo(cx0,cy0);
      ctxM.lineTo(z.cx,z.cy);
      ctxM.strokeStyle=`rgba(${col},0.08)`;
      ctxM.lineWidth=1;
      ctxM.stroke();
    }
  });

  // ── MELODY ORB TRAILS ──
  melodyOrbs.forEach(o=>{
    if(o.trail.length < 2) return;
    ctxM.beginPath();
    ctxM.moveTo(o.trail[0].x, o.trail[0].y);
    for(let t=1;t<o.trail.length;t++) {
      ctxM.lineTo(o.trail[t].x, o.trail[t].y);
    }
    const colR = isNight() ? '64,200,240' : '0,110,168';
    const trailA = o.glow > 0.1 ? 0.18+o.glow*0.18 : 0.07;
    ctxM.strokeStyle = `rgba(${colR},${trailA})`;
    ctxM.lineWidth = 1.2;
    ctxM.stroke();
  });

  // ── MELODY ORBS ──
  melodyOrbs.forEach(o=>{
    const pulse = o.active
      ? o.r*(1+0.2*Math.sin(tNow*10))
      : o.r*(0.9+0.1*Math.sin(tNow*1.5+(o.noteIdx*0.4)));
    const colR = isNight() ? '64,200,240' : '0,110,168';

    // Glow
    if(o.glow > 0.01) {
      const grd=ctxM.createRadialGradient(o.x,o.y,pulse*0.4,o.x,o.y,pulse*3.5);
      grd.addColorStop(0,`rgba(${colR},${o.glow*0.5})`);
      grd.addColorStop(1,`rgba(${colR},0)`);
      ctxM.beginPath();
      ctxM.arc(o.x,o.y,pulse*3.5,0,Math.PI*2);
      ctxM.fillStyle=grd;
      ctxM.fill();
    }

    // Core
    ctxM.beginPath();
    ctxM.arc(o.x,o.y,pulse,0,Math.PI*2);
    ctxM.strokeStyle=`rgba(${colR},${o.active?0.9:0.30+o.glow*0.3})`;
    ctxM.lineWidth=o.active?2:1;
    ctxM.stroke();
    if(o.active || o.glow>0.1) {
      ctxM.fillStyle=`rgba(${colR},${(o.active?0.20:0.08)+o.glow*0.12})`;
      ctxM.fill();
    }

    // Note label
    ctxM.font=`${o.active?700:400} ${o.active?12:10}px 'DM Mono',monospace`;
    ctxM.fillStyle=`rgba(${colR},${o.active?1.0:0.55+o.glow*0.3})`;
    ctxM.textAlign='center'; ctxM.textBaseline='middle';
    ctxM.fillText(o.label,o.x,o.y);
  });

  // ── MELODY PARTICLES ──
  MELODY_PARTICLES.forEach(p=>{
    const colR = isNight() ? '64,200,240' : '0,110,168';
    ctxM.beginPath();
    ctxM.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
    ctxM.fillStyle=`rgba(${colR},${p.life*0.7})`;
    if(isNight()) {
      ctxM.shadowColor=`rgba(${colR},0.8)`;
      ctxM.shadowBlur=p.r*3;
    }
    ctxM.fill();
    ctxM.shadowBlur=0;
  });

  // ── FINGERTIP PARTICLES ──
  for(let i=particles.length-1;i>=0;i--) {
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy;
    p.vy+=0.05;
    p.life-=p.decay;
    if(p.life<=0) { particles.splice(i,1); continue; }
    ctxM.beginPath();
    ctxM.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
    ctxM.fillStyle=p.color+Math.round(p.life*255).toString(16).padStart(2,'0');
    if(isNight()) {
      ctxM.shadowColor=p.color;
      ctxM.shadowBlur=p.r*4;
    }
    ctxM.fill();
    ctxM.shadowBlur=0;
  }

  // ── FINGERTIP DOTS ──
  ['L','R'].forEach(side=>{
    const col = side==='L'
      ? (isNight()?'#f0c040':'#b87800')
      : (isNight()?'#40c8f0':'#006ea8');
    handPos[side].forEach(f=>{
      ctxM.beginPath();
      ctxM.arc(f.sx, f.sy, 7, 0, Math.PI*2);
      ctxM.fillStyle=col;
      if(isNight()) {
        ctxM.shadowColor=col;
        ctxM.shadowBlur=18;
      }
      ctxM.fill();
      ctxM.shadowBlur=0;
      ctxM.beginPath();
      ctxM.arc(f.sx, f.sy, 3, 0, Math.PI*2);
      ctxM.fillStyle='#fff';
      ctxM.fill();
    });
  });

  // ── UI OVERLAY: center label ──
  ctxUi.clearRect(0,0,W,H);
  if(W > 600) {
    const cx = W*0.5;
    ctxUi.save();
    ctxUi.textAlign='center';
    ctxUi.textBaseline='top';
    ctxUi.font=`700 9px 'DM Mono', monospace`;
    ctxUi.fillStyle = isNight() ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.10)';
    ctxUi.letterSpacing='0.12em';
    ctxUi.fillText('LEFT · CHORDS', cx-W*0.18, H*0.5);
    ctxUi.fillText('RIGHT · MELODY', cx+W*0.18, H*0.5);
    ctxUi.restore();
  }

  // oscilloscope
  drawScope();
}

// ─────────────────────────────────────────────
// M. OSCILLOSCOPE
// ─────────────────────────────────────────────
const scopeCanvas = document.getElementById('scope');
const scopeCtx    = scopeCanvas.getContext('2d');
function resizeScope() {
  const wrap = document.getElementById('scope-wrap');
  scopeCanvas.width  = wrap.clientWidth;
  scopeCanvas.height = wrap.clientHeight;
}
window.addEventListener('resize', resizeScope);

function drawScope() {
  const SW=scopeCanvas.width, SH=scopeCanvas.height;
  scopeCtx.clearRect(0,0,SW,SH);
  if(!analyserNode) return;
  const buf=new Uint8Array(analyserNode.frequencyBinCount);
  analyserNode.getByteTimeDomainData(buf);
  const isDay = document.body.dataset.theme==='day';
  scopeCtx.strokeStyle=isDay?'#b87800':'#f0c040';
  scopeCtx.lineWidth=1.5;
  scopeCtx.beginPath();
  const sw=SW/buf.length;
  for(let i=0;i<buf.length;i++){
    const y=(buf[i]/128)*SH/2;
    i===0?scopeCtx.moveTo(0,y):scopeCtx.lineTo(i*sw,y);
  }
  scopeCtx.stroke();
  let sum=0; buf.forEach(v=>sum+=Math.abs(v-128));
  const rms=Math.min((sum/buf.length/128)*200,100);
  document.getElementById('vu-fill').style.width=rms+'%';
}

// ─────────────────────────────────────────────
// N. MEDIAPIPE HANDS
// ─────────────────────────────────────────────
const HAND_COLORS={L:'#f0c040',R:'#40c8f0'};
let lastFrameTime=0;
const TARGET_FPS=20, FRAME_MS=1000/TARGET_FPS;

function initMediaPipe() {
  if(!window.Hands) { setCamStatus('err','NO MP'); return; }
  const hands=new Hands({
    locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
  });
  hands.setOptions({
    maxNumHands:2, modelComplexity:0,
    minDetectionConfidence:.55, minTrackingConfidence:.45,
  });
  hands.onResults(onHandResults);

  navigator.mediaDevices.getUserMedia({
    video:{facingMode:'user',width:{ideal:320},height:{ideal:240}},
    audio:false
  }).then(stream=>{
    camStream=stream;
    camVideo.srcObject=stream;
    setCamStatus('wait','LOADING');

    let animId;
    async function loop(ts) {
      animId=requestAnimationFrame(loop);
      if(ts-lastFrameTime<FRAME_MS) return;
      lastFrameTime=ts;
      if(camVideo.readyState>=2) {
        try{ await hands.send({image:camVideo}); }catch(e){}
      }
    }
    camVideo.addEventListener('loadeddata',()=>{
      state.camReady=true;
      setCamStatus('ok','CAM');
      requestAnimationFrame(loop);
    });
  }).catch(err=>{
    setCamStatus('err','NO CAM');
  });
}

function setCamStatus(type,text){
  document.getElementById('cam-dot').className='cam-dot '+type;
  document.getElementById('cam-label').textContent=text;
}

const fingerStateMP={};

function onHandResults(results) {
  // Clear hand positions from MediaPipe
  handPos.L=[];
  handPos.R=[];

  if(!results.multiHandLandmarks?.length) {
    document.body.classList.remove('hands-active');
    // Release all MP fingers
    ['L','R'].forEach(side=>{
      FINGERTIP_IDS.forEach((_,fi)=>{
        const fkey=`${side}_F${fi}`;
        const prev=fingerStateMP[fkey];
        if(prev!==undefined && prev>=0) {
          if(side==='L') {
            for(let i=0;i<6;i++) stopNote(`L_${fi}_${i}`);
            chordZones[prev]?.fingerIds.delete(fi);
          } else {
            stopNote(`R_${fi}`);
            melodyOrbs[prev]?.fingerIds.delete(fi);
          }
          fingerStateMP[fkey]=-1;
        }
      });
    });
    return;
  }

  document.body.classList.add('hands-active');

  // Map MP hands
  const handMap={};
  results.multiHandLandmarks.forEach((lm,i)=>{
    const mpLabel=results.multiHandedness?.[i]?.label||'Right';
    const side=mpLabel==='Left'?'R':'L';
    handMap[side]=lm;
  });

  // Release missing hands
  ['L','R'].forEach(side=>{
    if(!handMap[side]) {
      FINGERTIP_IDS.forEach((_,fi)=>{
        const fkey=`${side}_F${fi}`;
        const prev=fingerStateMP[fkey];
        if(prev!==undefined && prev>=0) {
          if(side==='L') {for(let i=0;i<6;i++) stopNote(`L_${fi}_${i}`); chordZones[prev]?.fingerIds.delete(fi);}
          else            {stopNote(`R_${fi}`); melodyOrbs[prev]?.fingerIds.delete(fi);}
          fingerStateMP[fkey]=-1;
        }
      });
    }
  });

  ['L','R'].forEach(side=>{
    const lm=handMap[side];
    if(!lm) return;

    FINGERTIP_IDS.forEach((tipId,fi)=>{
      const tip=lm[tipId];
      if(!tip) return;
      // Mirrored: flip X
      const sx=(1-tip.x)*W;
      const sy=tip.y*H;
      handPos[side].push({sx,sy,fi});
    });
  });
}

// ─────────────────────────────────────────────
// O. RECORDING  (PRESERVED)
// ─────────────────────────────────────────────
let mediaRec=null, recChunks=[], recStart=0, recInterval=null, lastBlob=null;
const recBtn=document.getElementById('rec-btn');
const dlBtn=document.getElementById('dl-btn');
const recTimer=document.getElementById('rec-timer');

recBtn.addEventListener('click',()=>{
  ensureAudio();
  if(mediaRec&&mediaRec.state==='recording'){
    mediaRec.stop(); clearInterval(recInterval);
    recBtn.textContent='⏺ REC'; recBtn.classList.remove('rec-on'); recTimer.textContent='';
    return;
  }
  recChunks=[];
  let opts={mimeType:'audio/webm;codecs=opus'};
  try{mediaRec=new MediaRecorder(recDest.stream,opts);}
  catch(e){mediaRec=new MediaRecorder(recDest.stream);}
  mediaRec.ondataavailable=e=>{if(e.data.size>0)recChunks.push(e.data);};
  mediaRec.onstop=()=>{
    lastBlob=new Blob(recChunks,{type:recChunks[0]?.type||'audio/webm'});
    dlBtn.style.display='';
    showToast('Recording ready ✓');
  };
  mediaRec.start(100);
  recBtn.textContent='⏹ STOP'; recBtn.classList.add('rec-on');
  recStart=Date.now();
  recInterval=setInterval(()=>{
    const s=Math.floor((Date.now()-recStart)/1000);
    recTimer.textContent=`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  },1000);
});
dlBtn.addEventListener('click',()=>{
  if(!lastBlob) return;
  const ts=new Date().toISOString().replace(/[-:T]/g,'').slice(0,15);
  const ext=lastBlob.type.includes('webm')?'webm':'wav';
  const a=document.createElement('a');
  a.href=URL.createObjectURL(lastBlob);
  a.download=`soundgo_mixtura_${ts}.${ext}`;
  a.click();
});

// ─────────────────────────────────────────────
// P. CONTROLS
// ─────────────────────────────────────────────
let isMuted=false;
document.getElementById('mute-btn').addEventListener('click',()=>{
  ensureAudio();
  isMuted=!isMuted;
  masterGain.gain.setTargetAtTime(isMuted?0:state.vol,ctx.currentTime,.06);
  const btn=document.getElementById('mute-btn');
  btn.textContent=isMuted?'🔇':'VOL';
  btn.classList.toggle('on',isMuted);
});

document.getElementById('scale-sel').addEventListener('change',e=>{
  state.scale=e.target.value; buildZones(); buildMesh();
  showToast('Scale: '+e.target.value);
});
document.getElementById('style-sel').addEventListener('change',e=>{
  state.style=e.target.value;
  showToast('Timbre: '+e.target.value);
});

const themeBtn=document.getElementById('theme-btn');
themeBtn.addEventListener('click',()=>{
  state.theme=state.theme==='night'?'day':'night';
  document.body.dataset.theme=state.theme;
  themeBtn.textContent=state.theme==='night'?'☀':'🌙';
});

document.getElementById('freq-btn').addEventListener('click',()=>{
  ensureAudio();
  document.getElementById('freq-modal').classList.add('open');
});
document.getElementById('freq-close').addEventListener('click',()=>{
  document.getElementById('freq-modal').classList.remove('open');
});
document.getElementById('freq-modal').addEventListener('click',e=>{
  if(e.target===document.getElementById('freq-modal'))
    document.getElementById('freq-modal').classList.remove('open');
});

function updateSliderPct(el){
  const pct=((el.value-el.min)/(el.max-el.min)*100).toFixed(1)+'%';
  el.style.setProperty('--pct',pct);
}
const freqSl=document.getElementById('freq-sl');
const volSl=document.getElementById('vol-sl');
const octSl=document.getElementById('oct-sl');

freqSl.addEventListener('input',()=>{
  state.baseFreq=parseFloat(freqSl.value);
  document.getElementById('freq-disp').textContent=`${freqSl.value} Hz — ${freqToNoteName(state.baseFreq)}`;
  updateSliderPct(freqSl); buildZones();
});
volSl.addEventListener('input',()=>{
  state.vol=parseInt(volSl.value)/100;
  document.getElementById('vol-disp').textContent=volSl.value+'%';
  if(masterGain&&!isMuted) masterGain.gain.setTargetAtTime(state.vol,ctx.currentTime,.05);
  updateSliderPct(volSl);
});
octSl.addEventListener('input',()=>{
  state.baseOct=parseInt(octSl.value);
  document.getElementById('oct-disp').textContent='Octave '+octSl.value;
  updateSliderPct(octSl); buildZones();
});
document.getElementById('vinyl-chk').addEventListener('change',e=>{
  state.vinyl=e.target.checked;
});
[freqSl,volSl,octSl].forEach(updateSliderPct);

// ─────────────────────────────────────────────
// Q. TOAST
// ─────────────────────────────────────────────
let toastT=null;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT);
  toastT=setTimeout(()=>t.classList.remove('show'),2200);
}

// ─────────────────────────────────────────────
// R. BOOT
// ─────────────────────────────────────────────
['click','touchstart','keydown'].forEach(ev=>{
  document.addEventListener(ev,()=>{
    ensureAudio();
    if(ctx?.state==='suspended') ctx.resume();
  },{once:true,passive:true});
});

window.addEventListener('resize',()=>{
  buildZones(); buildMesh(); resizeScope();
});

window.addEventListener('load',()=>{
  resize();
  resizeScope();
  buildMesh();
  requestAnimationFrame(render);
  setTimeout(initMediaPipe, 500);
  showToast('SOUNDGO · MIXTURA V3');
});
</script>
