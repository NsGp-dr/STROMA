<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DJSTROMA · TRAPEZOID & JUST INTONATION EDITION</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&amp;family=Syne:wght@700;800&amp;display=swap" rel="stylesheet">
<style>
/* ───────────────────────────────────────
   DESIGN TOKENS — Night / Day
   ─────────────────────────────────────── */
:root {
  --bg:        #0b0c0e;
  --surface:   #13161a;
  --surface2:  #1c2029;
  --border:    #2a2f3a;
  --text:      #e8eaf0;
  --text-dim:  #5a6070;
  --text-mid:  #9aa0b0;
  --left:      #f0c040;
  --left-glow: rgba(240,192,64,0.5);
  --left-dim:  rgba(240,192,64,0.12);
  --right:     #40c8f0;
  --right-glow:rgba(64,200,240,0.5);
  --right-dim: rgba(64,200,240,0.12);
  --shadow:    0 2px 20px rgba(0,0,0,0.8);
  --radius:    10px;
  --radius-sm: 6px;
}
[data-theme="day"] {
  --bg:        #f0ece3;
  --surface:   #ffffff;
  --surface2:  --e4dfd6;
  --border:    #c8c3b8;
  --text:      #111214;
  --text-dim:  #888070;
  --text-mid:  #555050;
  --left:      #b87800;
  --left-glow: rgba(184,120,0,0.4);
  --left-dim:  rgba(184,120,0,0.10);
  --right:     #006ea8;
  --right-glow:rgba(0,110,168,0.4);
  --right-dim: rgba(0,110,168,0.10);
}

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html, body {
  width:100%; height:100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size:13px;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: none;
}

/* ── MAIN CANVAS STACK ── */
#canvas-bg,
#canvas-main,
#canvas-ui {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
}
#canvas-bg   { z-index: 1; }  
#canvas-main { z-index: 2; }  
#canvas-ui   { z-index: 3; pointer-events:none; } 

/* ── HUD HEADER ── */
#hud {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 14px;
  height: 48px;
  background: linear-gradient(to bottom, rgba(11,12,14,0.88) 60%, transparent);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
[data-theme="day"] #hud {
  background: linear-gradient(to bottom, rgba(240,236,227,0.92) 60%, transparent);
}
#wordmark {
  font-family: 'Syne', sans-serif;
  font-size: 17px;
  font-weight: 800;
  letter-spacing: .5px;
  color: var(--text);
  white-space: nowrap;
  flex-shrink: 0;
}
#wordmark em { color: var(--left); font-style:normal; }
.h-sep { width:1px; height:20px; background:var(--border); flex-shrink:0; }
.spacer { flex:1; }

.hctl { display:flex; align-items:center; gap:6px; flex-shrink:0; }
.hctl label { font-size:10px; letter-spacing:.08em; color:var(--text-dim); white-space:nowrap; }

select {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size:11px;
  padding: 3px 6px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
  min-width: 80px;
}
select:focus { outline:none; border-color:var(--left); }
select option { background: var(--surface); }

.pill {
  display:inline-flex; align-items:center; gap:4px;
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: rgba(255,255,255,0.04);
  color: var(--text-mid);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  cursor: pointer;
  white-space: nowrap;
  transition: background .12s, border-color .12s, color .12s;
  flex-shrink: 0;
}
.pill:hover { background: rgba(255,255,255,0.10); color: var(--text); }
.pill.on { background: var(--left); color: var(--bg); border-color: var(--left); }
.pill.rec-on { background: #e03030; color:#fff; border-color:#e03030; animation: recpulse 1s infinite; }
@keyframes recpulse { 0%,100%{opacity:1} 50%{opacity:.6} }

/* ── STATUS BAR ── */
#statusbar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 14px;
  height: 36px;
  background: linear-gradient(to top, rgba(11,12,14,0.88) 60%, transparent);
  border-top: 1px solid rgba(255,255,255,0.06);
}
[data-theme="day"] #statusbar {
  background: linear-gradient(to top, rgba(240,236,227,0.92) 60%, transparent);
}
#cam-indicator { display:flex; align-items:center; gap:5px; }
.cam-dot { width:6px; height:6px; border-radius:50%; background:var(--text-dim); }
.cam-dot.ok   { background:#3a3; }
.cam-dot.err  { background:#d33; }
.cam-dot.wait { background:#a80; animation:blink .8s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.cam-lbl { font-size:10px; color:var(--text-dim); }

#scope-wrap { flex:1; height:22px; overflow:hidden; }
#scope { width:100%; height:100%; display:block; }
#vu { width:56px; height:5px; background:var(--surface2); border-radius:3px; overflow:hidden; flex-shrink:0; }
#vu-fill { height:100%; width:0; background:linear-gradient(90deg,#3a3,#f0c040,#d33); border-radius:3px; transition:width .05s; }
#rec-timer { color:#e03030; font-size:11px; min-width:36px; font-weight: bold; }

/* ── HUD READOUTS ── */
#readout-left, #readout-right {
  position: fixed;
  top: 56px;
  z-index: 9;
  display: flex;
  flex-direction: column;
  gap: 2px;
  pointer-events: none;
}
#readout-left  { left: 14px; }
#readout-right { right: 14px; align-items: flex-end; }
.readout-tag {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: .12em;
  text-transform: uppercase;
  opacity: .55;
}
#readout-left  .readout-tag  { color: var(--left); }
#readout-right .readout-tag  { color: var(--right); }
.readout-chord {
  font-family: 'Syne', sans-serif;
  font-size: 28px;
  font-weight: 800;
  line-height: 1;
  letter-spacing: -.02em;
  transition: opacity .15s;
}
#readout-left  .readout-chord { color: var(--left);  text-shadow: 0 0 30px var(--left-glow); }
#readout-right .readout-chord { color: var(--right); text-shadow: 0 0 30px var(--right-glow); }
.readout-info { font-size:10px; color:var(--text-dim); letter-spacing:.06em; }

/* ── MODAL ── */
#freq-modal {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.72); z-index:200;
  align-items:center; justify-content:center; backdrop-filter:blur(4px);
}
#freq-modal.open { display:flex; }
#freq-box {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:20px 24px;
  width:min(340px,90vw);
  display:flex; flex-direction:column; gap:12px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6);
}
#freq-box h3 { font-family:'Syne',sans-serif; font-size:15px; font-weight:800; }
.slider-row { display:flex; flex-direction:column; gap:4px; }
.slider-row label { font-size:11px; color:var(--text-dim); }
input[type=range] {
  width:100%; cursor:pointer;
  appearance:none; -webkit-appearance:none;
  height:5px;
  background:linear-gradient(90deg,var(--left) var(--pct,50%),var(--border) var(--pct,50%));
  border-radius:3px; outline:none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; width:17px; height:17px;
  background:var(--text); border-radius:50%; cursor:pointer;
}
input[type=range]::-moz-range-thumb {
  width:17px; height:17px; background:var(--text); border-radius:50%; border:none; cursor:pointer;
}
.slider-val { font-size:12px; color:var(--text); text-align:right; }
.modal-close {
  align-self:flex-end; padding:6px 16px;
  border:1px solid var(--border); border-radius:20px;
  background:var(--surface2); color:var(--text);
  font-family:'DM Mono',monospace; font-size:11px; cursor:pointer;
}
.modal-close:hover { background:rgba(255,255,255,0.08); }

/* ── TOAST ── */
#toast {
  position:fixed; bottom:46px; left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--text); color:var(--bg);
  padding:7px 18px; border-radius:20px;
  font-size:11px; font-weight:500;
  opacity:0; pointer-events:none;
  transition:opacity .2s, transform .2s;
  z-index:999; white-space:nowrap;
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ── ZONE LABELS ── */
#zone-label-l, #zone-label-r {
  position: fixed; top: 50%; transform: translateY(-50%);
  z-index: 8; pointer-events:none;
  font-family: 'Syne', sans-serif;
  font-size: 11px; font-weight: 800;
  letter-spacing: .18em; text-transform: uppercase;
  writing-mode: vertical-rl;
  opacity: 0.12;
  transition: opacity .4s;
}
#zone-label-l { left: 6px; color: var(--left); }
#zone-label-r { right: 6px; color: var(--right); transform: translateY(-50%) rotate(180deg); }
body.hands-active #zone-label-l,
body.hands-active #zone-label-r { opacity: 0; }

#cam-video { position:fixed; top:-9999px; left:-9999px; width:320px; height:240px; }
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
/* ═══════════════════════════════════════════════════════════════
   DJSTROMA TRAPEZOID & JUST INTONATION EDITION
   ═══════════════════════════════════════════════════════════════ */
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

// Ratios matemáticas puras para Just Intonation (Afinación Justa) sin temperamento igual
const JI_RATIOS = {
  major: [1/1, 9/8, 5/4, 4/3, 3/2, 5/3, 15/8],
  minor: [1/1, 9/8, 6/5, 4/3, 3/2, 8/5, 9/5],
  penta_maj: [1/1, 9/8, 5/4, 3/2, 5/3],
  penta_min: [1/1, 6/5, 4/3, 3/2, 9/5]
};

const ROMAN = ['I','II','III','IV','V','VI','VII','VIII','IIb','IIIb','Vb','VIb','VIIb','IVadd','IXsus','Vaug'];
const LEFT_DEGREES = [0,1,2,3,4,5,6,7,0,2,4,6,1,3,5,7];

// Retorna multiplicadores armónicos puros para construir acordes limpios
function getJIChordIntervals(degIdx, scaleName, style) {
  const ratios = JI_RATIOS[scaleName];
  const len = ratios.length;
  
  const r = ratios[degIdx % len];
  const t3 = ratios[(degIdx + 2) % len] * ((degIdx + 2) >= len ? 2 : 1);
  const t5 = ratios[(degIdx + 4) % len] * ((degIdx + 4) >= len ? 2 : 1);
  const t7 = ratios[(degIdx + 6) % len] * ((degIdx + 6) >= len ? 2 : 1);
  const t9 = ratios[(degIdx + 8) % len] * ((degIdx + 8) >= len ? 4 : 2);

  if(style==='organ') return [r, r*1.5, r*2.0, r*3.0];
  if(style==='xylophone') return [r, t3, t5];
  if(style==='steven') return [r, t3, t5, r*1.875];
  return [r, t3, t5, t7, t9]; // Lo-fi / Piano limpio
}

function chordName(degIdx, scaleName, style) {
  const ext = {steven:'maj9_JI', lofi:'7/9_JI', piano:'maj7_JI', organ:'Pure_5', xylophone:'Triad'};
  return (ROMAN[degIdx]||'?')+(ext[style]||'');
}

function freqToNoteName(hz) {
  if(hz<=0) return '—';
  const midi = Math.round(12*Math.log2(hz/440)+69);
  const oct = Math.floor(midi/12)-1;
  return NOTE_NAMES[((midi%12)+12)%12]+oct;
}

const state = { 
  scale:'major', style:'lofi', baseFreq:261.63, baseOct:3, vol:0.70, vinyl:false, theme:'night', 
  camReady:false, rawLandmarks:{L:null,R:null}, bpm:120, loopBeats:4, loopDuration:2.0, 
  loopStartCtxTime:0, isRecordingLoop:false, loopEvents:[], radialFilterMetric:0,
  scoreMode: false, scoreAudioBuffer: null, scoreAudioSource: null, scoreAnalyser: null
};

let ctx=null, masterGain=null, limiter=null, reverb=null, analyserNode=null, recDest=null, mediaRecorder=null, recordedChunks=[];
let vinylSrc=null, vinylGain=null, activeVoices=new Map(), dynFilter=null, melodyFilter=null;

let lastActiveLeftZone = -1;
let lastActiveRightZone = -1;

const MAX_VOICES=30, SYNTH={
  steven:{wave:'sine',A:.02,D:.3,S:.6,R:.4,spread:2,filt:6000,gain:.22},
  lofi:{wave:'triangle',A:.05,D:.4,S:.5,R:.3,spread:5,filt:1400,gain:.25},
  piano:{wave:'triangle',A:.008,D:.8,S:.3,R:.5,spread:1,filt:8000,gain:.28},
  organ:{wave:'sine',A:.03,D:.0,S:.9,R:.3,spread:0,filt:4000,gain:.20,harmonics:[1,2,3,4]},
  xylophone:{wave:'sine',A:.002,D:.3,S:.0,R:.2,spread:0,filt:12000,gain:.35}
};

function ensureAudio() { 
  if(ctx) return; 
  ctx=new (window.AudioContext||window.webkitAudioContext)(); 
  masterGain=ctx.createGain(); 
  masterGain.gain.value=state.vol;

  reverb = ctx.createConvolver();
  const reverbTime = 1.8;
  const sampleRate = ctx.sampleRate;
  const length = sampleRate * reverbTime;
  const impulse = ctx.createBuffer(2, length, sampleRate);
  for (let channel = 0; channel < 2; channel++) {
    const channelData = impulse.getChannelData(channel);
    for (let i = 0; i < length; i++) {
      channelData[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 2.0);
    }
  }
  reverb.buffer = impulse;
  const reverbGain = ctx.createGain(); reverbGain.gain.value = 0.28;
  const dryGain = ctx.createGain(); dryGain.gain.value = 0.72;

  limiter=ctx.createDynamicsCompressor(); limiter.threshold.value=-2; limiter.knee.value=4; limiter.ratio.value=15;
  analyserNode=ctx.createAnalyser(); analyserNode.fftSize=256;
  recDest=ctx.createMediaStreamDestination();

  dynFilter=ctx.createBiquadFilter(); dynFilter.type='lowpass'; dynFilter.frequency.value=4200; dynFilter.Q.value=1.0;
  melodyFilter=ctx.createBiquadFilter(); melodyFilter.type='lowpass'; melodyFilter.frequency.value=3800; melodyFilter.Q.value=1.0;

  masterGain.connect(limiter);
  limiter.connect(dynFilter);
  limiter.connect(melodyFilter);
  dynFilter.connect(reverb); reverb.connect(analyserNode);
  melodyFilter.connect(reverb); 
  dynFilter.connect(dryGain); dryGain.connect(analyserNode);
  melodyFilter.connect(dryGain);
  analyserNode.connect(ctx.destination);
  analyserNode.connect(recDest);

  const bsz=ctx.sampleRate*2, nb=ctx.createBuffer(1,bsz,ctx.sampleRate); 
  const nd=nb.getChannelData(0); for(let i=0;i<bsz;i++) nd[i]=(Math.random()*2-1)*0.015;
  vinylSrc=ctx.createBufferSource(); vinylSrc.buffer=nb; vinylSrc.loop=true; 
  const nf=ctx.createBiquadFilter(); nf.type='bandpass'; nf.frequency.value=600; nf.Q.value=0.5;
  vinylGain=ctx.createGain(); vinylGain.gain.value=0; vinylSrc.connect(nf); nf.connect(vinylGain); vinylGain.connect(masterGain); vinylSrc.start();
  state.loopDuration = (60 / state.bpm) * state.loopBeats;
}

function playNote(key, freq, customGain=null) { 
  if(!ctx) return; 
  if(activeVoices.size>=MAX_VOICES){const oldest=activeVoices.keys().next().value; stopNote(oldest, true);} 
  const p=SYNTH[state.style], now=ctx.currentTime, nodes=[]; 
  const routeToFilter = key.startsWith('R_') ? melodyFilter : dynFilter; 
  const gainMul = customGain !== null ? customGain : 1.0; 

  (p.harmonics||[1]).forEach((h,hi)=>{ 
    const osc=ctx.createOscillator(); 
    const env=ctx.createGain(); 
    osc.type=p.wave; 
    osc.frequency.value=freq*h; 
    osc.detune.value=(Math.random()-.5)*p.spread*2; 
    const g=(p.gain*gainMul)/(hi+1)/(p.harmonics||[1]).length; 
    env.gain.setValueAtTime(0,now); 
    env.gain.linearRampToValueAtTime(g, now+p.A); 
    env.gain.linearRampToValueAtTime(g*p.S, now+p.A+p.D); 
    osc.connect(env); 
    env.connect(routeToFilter); 
    osc.start(now); 
    nodes.push({osc,env}); 
  }); 

  activeVoices.set(key,{nodes,p:p}); 
  if(vinylGain){const want=(state.vinyl&&state.style==='lofi')?0.10:0; vinylGain.gain.setTargetAtTime(want,now,.1);} 
}

function stopNote(key, immediate=false) { 
  const v=activeVoices.get(key); 
  if(!v) return; 
  const now=ctx.currentTime, p=v.p; 
  v.nodes.forEach(({osc,env})=>{ 
    if(!env) return; 
    try{ 
      env.gain.cancelScheduledValues(now); 
      env.gain.setValueAtTime(env.gain.value,now); 
      if(immediate) env.gain.setValueAtTime(0,now); 
      else env.gain.linearRampToValueAtTime(0,now+p.R); 
      osc.stop(now+p.R+0.05); 
    }catch(e){} 
  }); 
  activeVoices.delete(key); 
}

function stopAllNotesByPrefix(prefix) {
  for (const key of activeVoices.keys()) {
    if (key.startsWith(prefix)) stopNote(key);
  }
}

function playChord(degIdx, fingerIdx, saveToSequencer=true) { 
  const rootFreq = state.baseFreq * Math.pow(2, (state.baseOct - 3));
  const jiMultipliers = getJIChordIntervals(degIdx, state.scale, state.style);
  
  stopAllNotesByPrefix(`L_${fingerIdx}`);
  jiMultipliers.forEach((mult, i) => playNote(`L_${fingerIdx}_${i}`, rootFreq * mult)); 
  if(saveToSequencer && state.isRecordingLoop) pushLoopEvent('chord', degIdx); 
}

function playMelodyNote(noteIdx, fingerIdx, saveToSequencer=true) { 
  const ratios = JI_RATIOS[state.scale];
  const len = ratios.length;
  const octOffset = Math.floor(noteIdx / len);
  const ratio = ratios[noteIdx % len];
  const freq = state.baseFreq * ratio * Math.pow(2, octOffset + 1);

  stopAllNotesByPrefix(`R_${fingerIdx}`);
  playNote(`R_${fingerIdx}_${noteIdx}`, freq); 
  if(saveToSequencer && state.isRecordingLoop) pushLoopEvent('melody', noteIdx); 
}

function pushLoopEvent(type,value){ 
  if(!ctx||state.loopStartCtxTime===0) return; 
  let offset=ctx.currentTime-state.loopStartCtxTime; 
  const stepTime=(60/state.bpm)/4; 
  offset=Math.round(offset/stepTime)*stepTime; 
  if(offset>=state.loopDuration) offset=0; 
  const exists=state.loopEvents.some(e=>e.type===type&&e.val===value&&Math.abs(e.timeOffset-offset)<0.02); 
  if(!exists){ 
    state.loopEvents.push({type,val:value,timeOffset:offset,triggered:false}); 
    document.getElementById('dl-btn').style.display=''; 
  } 
}

function runLoopSequencerEngine(){ 
  if(!ctx) return; 
  const now=ctx.currentTime; 
  if(state.loopStartCtxTime===0) state.loopStartCtxTime=now; 
  let currentOffset=now-state.loopStartCtxTime; 
  if(currentOffset>=state.loopDuration){ 
    state.loopStartCtxTime+=state.loopDuration; 
    currentOffset=now-state.loopStartCtxTime; 
    state.loopEvents.forEach(e=>e.triggered=false); 
  } 
  state.loopEvents.forEach(e=>{ 
    if(!e.triggered&&currentOffset>=e.timeOffset){ 
      e.triggered=true; 
      if(e.type==='chord'){ 
        playChord(e.val,99,false); 
        setTimeout(()=> stopAllNotesByPrefix('L_99'), 600); 
      } else if(e.type==='melody'){ 
        playMelodyNote(e.val,99,false); 
        setTimeout(()=> stopAllNotesByPrefix('R_99'), 400); 
      } 
    } 
  }); 
}

function modulateFromFingers(lFingers){ 
  if(!dynFilter||!ctx) return; 
  if(lFingers.length){ 
    const avgY=lFingers.reduce((s,f)=>s+f.y,0)/lFingers.length; 
    const cutoff=200+(1-avgY)*6500; 
    dynFilter.frequency.setTargetAtTime(Math.max(100,Math.min(16000,cutoff)),ctx.currentTime,0.05); 
  } 
}

let chordZones=[], melodyTrapezoidPads=[];

function buildZones(){
  chordZones=[]; melodyTrapezoidPads=[];
  const LW=W*0.5; 
  
  // Matriz de Acordes (Izquierda)
  const ringDefs=[ { count:8, rRing: Math.min(LW*0.28, H*0.24), startDegIdx:0 }, { count:8, rRing: Math.min(LW*0.15, H*0.12), startDegIdx:8 } ];
  let zIdx=0;
  ringDefs.forEach(ring=>{ 
    for(let i=0;i<ring.count;i++){ 
      const angle=(i/ring.count)*Math.PI*2 - Math.PI/2; 
      const cx=LW*0.5 + Math.cos(angle)*ring.rRing; 
      const cy=H*0.5 + Math.sin(angle)*ring.rRing; 
      const r=ring.rRing*0.28 + 14; 
      const degIdx=LEFT_DEGREES[zIdx%LEFT_DEGREES.length]; 
      chordZones.push({ cx,cy,r,degIdx,label:chordName(degIdx,state.scale,state.style), animR:r, active:false, glow:0 }); 
      zIdx++; 
    } 
  });

  // Geometría del Trapecio Expresivo (Derecha) - Barrido ergonómico de la mano
  const rows = 4;
  const cols = 3;
  const lerp = (a, b, t) => a + (b - a) * t;

  for(let r=0; r<rows; r++) {
    const tRow = r / (rows - 1 || 1);
    // Configura la inclinación del trapecio anatómico
    const xLeft = lerp(W * 0.56, W * 0.53, tRow);
    const xRight = lerp(W * 0.88, W * 0.94, tRow);
    const yRow = lerp(H * 0.18, H * 0.82, tRow);

    for(let c=0; c<cols; c++) {
      const tCol = c / (cols - 1 || 1);
      const cx = lerp(xLeft, xRight, tCol);
      const cy = yRow;
      const noteIdx = r * cols + c;

      const ratios = JI_RATIOS[state.scale];
      const ratio = ratios[noteIdx % ratios.length];
      const label = NOTE_NAMES[Math.round(12 * Math.log2(ratio)) % 12] || 'JI';

      melodyTrapezoidPads.push({
        cx, cy, r: 32, // Zonas grandes optimizadas para barrido veloz
        noteIdx, label, active: false, glow: 0
      });
    }
  }
}

let particles=[]; 
function emitParticles(x,y,color,n=6,burst=false){ 
  for(let i=0;i<n;i++){ 
    const angle=Math.random()*Math.PI*2; 
    const spd=burst?2+Math.random()*4:0.5+Math.random()*1.5; 
    particles.push({ x,y, vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd, life:1.0, decay:burst?0.025:0.012, r:burst?4:2, color }); 
  } 
}

let handPos={L:[],R:[]};

function processHandInputs(){
  if (state.scoreMode) return; // Si está en modo partitura automatizada, bloquea el tracking de manos para observación pura.

  const colLeft='#f0c040', colRight='#40c8f0';
  const now = ctx ? ctx.currentTime : 0;

  // Filtrado Expresivo con Apertura de Mano Derecha (Landmark 8 índice)
  if(state.rawLandmarks.R && melodyFilter){ 
    const lm=state.rawLandmarks.R; 
    const indexTip=lm[8]; 
    if(indexTip){ 
      const otherTips=[4,12,16,20]; let distSum=0; 
      otherTips.forEach(id=>{if(lm[id]) distSum+=Math.hypot(lm[id].x-indexTip.x, lm[id].y-indexTip.y);}); 
      const avgRadialDistance=distSum/4; 
      const baseCutoff=300+(avgRadialDistance*6000); 
      melodyFilter.frequency.setTargetAtTime(Math.max(100,Math.min(16000,baseCutoff)),ctx.currentTime,0.06); 
    } 
  }

  // MANO IZQUIERDA: Acordes dinámicos (Suenan solo al tocar dentro)
  let activeLeftIdx = -1;
  if (handPos.L.length > 0) {
    const f = handPos.L[0];
    emitParticles(f.sx, f.sy, colLeft, 1);
    let bestD = Infinity;
    chordZones.forEach((z, i) => {
      const d = Math.hypot(f.sx - z.cx, f.sy - z.cy);
      if (d < z.r * 1.5 && d < bestD) { bestD = d; activeLeftIdx = i; }
    });
  }

  if (activeLeftIdx !== lastActiveLeftZone) {
    if (lastActiveLeftZone >= 0) { stopAllNotesByPrefix('L_0'); chordZones[lastActiveLeftZone].active = false; }
    if (activeLeftIdx >= 0) {
      ensureAudio();
      chordZones[activeLeftIdx].active = true;
      playChord(chordZones[activeLeftIdx].degIdx, 0);
      document.getElementById('chord-left').textContent = chordZones[activeLeftIdx].label;
      emitParticles(chordZones[activeLeftIdx].cx, chordZones[activeLeftIdx].cy, colLeft, 12, true);
    } else {
      document.getElementById('chord-left').textContent = '—';
    }
    lastActiveLeftZone = activeLeftIdx;
  }

  // MANO DERECHA: Trapecio Melódico (Suena solo mientras el índice se encuentre encima)
  let activeRightIdx = -1;
  if (handPos.R.length > 0) {
    const f = handPos.R[0];
    emitParticles(f.sx, f.sy, colRight, 1);
    let bestD = Infinity;
    melodyTrapezoidPads.forEach((pad, i) => {
      const d = Math.hypot(f.sx - pad.cx, f.sy - pad.cy);
      if (d < pad.r * 1.6 && d < bestD) { bestD = d; activeRightIdx = i; }
    });
  }

  if (activeRightIdx !== lastActiveRightZone) {
    if (lastActiveRightZone >= 0) { stopAllNotesByPrefix('R_0'); melodyTrapezoidPads[lastActiveRightZone].active = false; }
    if (activeRightIdx >= 0) {
      ensureAudio();
      melodyTrapezoidPads[activeRightIdx].active = true;
      playMelodyNote(melodyTrapezoidPads[activeRightIdx].noteIdx, 0);
      document.getElementById('chord-right').textContent = melodyTrapezoidPads[activeRightIdx].label;
      emitParticles(melodyTrapezoidPads[activeRightIdx].cx, melodyTrapezoidPads[activeRightIdx].cy, colRight, 12, true);
    } else {
      document.getElementById('chord-right').textContent = '—';
    }
    lastActiveRightZone = activeRightIdx;
  }

  // Actualizar suavizado visual de destellos
  chordZones.forEach(z => { z.glow = z.active ? Math.min(1, z.glow+0.15) : Math.max(0, z.glow-0.08); });
  melodyTrapezoidPads.forEach(p => { p.glow = p.active ? Math.min(1, p.glow+0.15) : Math.max(0, p.glow-0.08); });

  const lScreenFingers = handPos.L.map(f=>({x:f.sx/W,y:f.sy/H})); modulateFromFingers(lScreenFingers);
}

let handsInstance=null, cameraInstance=null; const videoElement=document.getElementById('cam-video');

function onHandResults(results){ 
  handPos.L=[]; handPos.R=[]; state.rawLandmarks.L=null; state.rawLandmarks.R=null; 
  if(!results.multiHandLandmarks||results.multiHandLandmarks.length===0){ document.body.classList.remove('hands-active'); return; }

// Mesh interactivo
let meshNodes=[], meshEdges=[], MESH_ROWS=7,MESH_COLS=5;
function buildMesh(){ meshNodes.length=0; meshEdges.length=0; const LW=W*0.5; const pad=40; for(let r=0;r<MESH_ROWS;r++) for(let c=0;c<MESH_COLS;c++){ const ox=pad+(LW-pad*2)*(c/(MESH_COLS-1)); const oy=60+(H-120)*(r/(MESH_ROWS-1)); meshNodes.push({x:ox,y:oy,vx:0,vy:0,ox,oy}); } for(let r=0;r<MESH_ROWS;r++) for(let c=0;c<MESH_COLS;c++){ const i=r*MESH_COLS+c; if(c<MESH_COLS-1) meshEdges.push([i,i+1]); if(r<MESH_ROWS-1) meshEdges.push([i,i+MESH_COLS]); if(c<MESH_COLS-1&&r<MESH_ROWS-1) meshEdges.push([i,i+MESH_COLS+1]); } }
function updateMesh(){ const allFingers=[...handPos.L]; const stiffness=0.06, damping=0.88; meshNodes.forEach(n=>{ let fx=(n.ox-n.x)*stiffness; let fy=(n.oy-n.y)*stiffness; allFingers.forEach(f=>{ const dx=n.x-f.sx, dy=n.y-f.sy; const d=Math.hypot(dx,dy)+1; if(d<120){ const force=(120-d)*(120-d)*0.0004; fx+=(dx/d)*force; fy+=(dy/d)*force; } }); chordZones.forEach(z=>{ if(z.active){ const dx=n.x-z.cx, dy=n.y-z.cy; const d=Math.hypot(dx,dy)+1; if(d<90){ const force=(90-d)*0.0006; fx+=(-dx/d)*force; fy+=(-dy/d)*force; } } }); n.vx=(n.vx+fx)*damping; n.vy=(n.vy+fy)*damping; n.x+=n.vx; n.y+=n.vy; }); }

// Motor Analizador para "Modo Partitura" (Mapea frecuencias del MP3 a los componentes visuales)
function runScoreModeAnalysis() {
  if (!state.scoreMode || !state.scoreAnalyser) return;
  const bufferLength = state.scoreAnalyser.frequencyBinCount;
  const dataArray = new Uint8Array(bufferLength);
  state.scoreAnalyser.getByteFrequencyData(dataArray);

  let maxVal = 0, maxIdx = -1;
  for(let i=4; i<bufferLength/2; i++) { // Evitar sub-graves ruidosos
    if (dataArray[i] > maxVal) { maxVal = dataArray[i]; maxIdx = i; }
  }

  // Si detecta suficiente amplitud, enciende dinámicamente zonas del instrumento
  if (maxVal > 115) {
    const nyquist = ctx.sampleRate / 2;
    const peakFreq = maxIdx * (nyquist / bufferLength);
    
    // Mapeo visual a trapecios
    let closestPadIdx = Math.floor(peakFreq / 90) % melodyTrapezoidPads.length;
    melodyTrapezoidPads.forEach((p, idx) => { p.active = (idx === closestPadIdx); if(p.active) p.glow = 1; });
    
    // Mapeo visual alternado a matriz de acordes
    let closestChordIdx = Math.floor(peakFreq / 140) % chordZones.length;
    chordZones.forEach((z, idx) => { z.active = (idx === closestChordIdx); if(z.active) z.glow = 1; });
  } else {
    melodyTrapezoidPads.forEach(p => p.active = false);
    chordZones.forEach(z => z.active = false);
  }
}

const scopeCanvas=document.getElementById('scope'), scopeCtx=scopeCanvas.getContext('2d');
function resizeScope(){ const wrap=document.getElementById('scope-wrap'); if(wrap){ scopeCanvas.width=wrap.clientWidth; scopeCanvas.height=wrap.clientHeight; } }
function drawScope(){ 
  const SW=scopeCanvas.width, SH=scopeCanvas.height; scopeCtx.clearRect(0,0,SW,SH); if(!analyserNode) return; 
  const buf=new Uint8Array(analyserNode.frequencyBinCount); analyserNode.getByteTimeDomainData(buf); 
  scopeCtx.strokeStyle=document.body.dataset.theme==='day'?'#b87800':'#40c8f0'; scopeCtx.lineWidth=1.5; scopeCtx.beginPath(); 
  const sw=SW/buf.length; for(let i=0;i<buf.length;i++){ const y=(buf[i]/128)*SH/2; i===0?scopeCtx.moveTo(0,y):scopeCtx.lineTo(i*sw,y); } 
  scopeCtx.stroke(); let sum=0; buf.forEach(v=>sum+=Math.abs(v-128)); const rms=Math.min((sum/buf.length/128)*200,100); 
  document.getElementById('vu-fill').style.width=rms+'%'; 
}

let lastRenderTs=0;
function render(ts){ 
  requestAnimationFrame(render); const dt=ts-lastRenderTs; lastRenderTs=ts; 
  if (state.scoreMode) { runScoreModeAnalysis(); } else { runLoopSequencerEngine(); processHandInputs(); }
  updateMesh();
  
  ctxBg.clearRect(0,0,W,H); ctxBg.fillStyle=document.body.dataset.theme!=='day'?'#0b0c0e':'#f0ece3'; ctxBg.fillRect(0,0,W,H);
  if(state.camReady && videoElement.readyState>=2 && !state.scoreMode){ ctxBg.save(); ctxBg.translate(W,0); ctxBg.scale(-1,1); ctxBg.globalAlpha=document.body.dataset.theme!=='day'?0.30:0.15; ctxBg.drawImage(videoElement,0,0,W,H); ctxBg.restore(); }
  
  const divX=W*0.5; ctxBg.fillStyle=document.body.dataset.theme!=='day'?'rgba(255,255,255,0.03)':'rgba(0,0,0,0.04)'; ctxBg.fillRect(divX-1,60,2,H-110);
  
  // Renderizado Malla Izquierda
  ctxM.clearRect(0,0,W,H); const meshAlpha=document.body.dataset.theme!=='day'?0.14:0.10; ctxM.strokeStyle=document.body.dataset.theme!=='day'?`rgba(240,192,64,${meshAlpha})`:`rgba(184,120,0,${meshAlpha})`; ctxM.lineWidth=0.7; 
  meshEdges.forEach(([a,b])=>{ const na=meshNodes[a], nb=meshNodes[b]; ctxM.beginPath(); ctxM.moveTo(na.x,na.y); ctxM.lineTo(nb.x,nb.y); ctxM.stroke(); });
  
  const tNow=ts*0.001, isNight=document.body.dataset.theme!=='day';
  
  // Dibujar Matriz Izquierda (Acordes)
  chordZones.forEach((z,i)=>{ 
    const pulse=z.active?z.r*(1+0.08*Math.sin(tNow*10)):z.r*(0.96+0.04*Math.sin(tNow*1.2)); 
    if(z.glow>0.01){ 
      const grd=ctxM.createRadialGradient(z.cx,z.cy,pulse*0.5,z.cx,z.cy,pulse*2.2); const col=isNight?'240,192,64':'184,120,0'; 
      grd.addColorStop(0,`rgba(${col},${z.glow*0.35})`); grd.addColorStop(1,`rgba(${col},0)`); ctxM.beginPath(); ctxM.arc(z.cx,z.cy,pulse*2.2,0,Math.PI*2); ctxM.fillStyle=grd; ctxM.fill(); 
    } 
    const col=isNight?'240,192,64':'184,120,0'; ctxM.beginPath(); ctxM.arc(z.cx,z.cy,pulse,0,Math.PI*2); ctxM.strokeStyle=z.active?`rgba(${col},0.95)`:`rgba(${col},0.22)`; ctxM.lineWidth=z.active?2.5:1; ctxM.stroke(); 
    ctxM.font=`${z.active?700:500} 11px 'Syne', sans-serif`; ctxM.fillStyle=`rgba(${col},${z.active?1.0:0.45})`; ctxM.textAlign='center'; ctxM.textBaseline='middle'; ctxM.fillText(z.label,z.cx,z.cy); 
  });
  
  // Dibujar Perímetro y Celdas del Trapecio Expresivo Derecho
  const colR = isNight ? '64,200,240' : '0,110,168';
  ctxM.strokeStyle = `rgba(${isNight?'64,200,240':'0,110,168'},0.15)`;
  ctxM.lineWidth = 1;
  
  melodyTrapezoidPads.forEach(pad => {
    const pulseR = pad.active ? pad.r * (1 + 0.08 * Math.sin(tNow * 12)) : pad.r;
    if(pad.glow > 0.01) {
      const grd = ctxM.createRadialGradient(pad.cx, pad.cy, pulseR*0.3, pad.cx, pad.cy, pulseR*2.0);
      grd.addColorStop(0, `rgba(${isNight?'64,200,240':'0,110,168'},${pad.glow*0.4})`);
      grd.addColorStop(1, 'transparent');
      ctxM.beginPath(); ctxM.arc(pad.cx, pad.cy, pulseR*2.0, 0, Math.PI*2);
      ctxM.fillStyle = grd; ctxM.fill();
    }
    
    ctxM.beginPath();
    ctxM.arc(pad.cx, pad.cy, pulseR, 0, Math.PI*2);
    ctxM.strokeStyle = pad.active ? `rgba(${colR}, 0.95)` : `rgba(${colR}, 0.35)`;
    ctxM.lineWidth = pad.active ? 2.5 : 1.2;
    ctxM.stroke();
    if(pad.active) { ctxM.fillStyle = `rgba(${colR}, 0.15)`; ctxM.fill(); }
    
    ctxM.font = `${pad.active?700:500} 11px 'DM Mono', monospace`;
    ctxM.fillStyle = `rgba(${colR}, ${pad.active?1.0:0.65})`;
    ctxM.textAlign = 'center'; ctxM.textBaseline = 'middle';
    ctxM.fillText(pad.label, pad.cx, pad.cy);
  });

  // Render Partículas
  for(let i=particles.length-1;i>=0;i--){ 
    const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.04; p.life-=p.decay; if(p.life<=0){ particles.splice(i,1); continue; } 
    ctxM.beginPath(); ctxM.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctxM.fillStyle=p.color+Math.round(p.life*255).toString(16).padStart(2,'0'); ctxM.fill(); 
  }
  
  // Dibujar Esqueleto de dedos tracking (solo si no está en modo partitura)
  if(!state.scoreMode) {
    const HAND_BONES=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];
    ['L','R'].forEach(side=>{ 
      const lm=state.rawLandmarks[side]; 
      if(lm){ 
        const colBase=side==='L'?(isNight?'#f0c040':'#b87800'):(isNight?'#40c8f0':'#006ea8'); ctxM.save(); ctxM.strokeStyle=colBase; ctxM.lineWidth=1.5; 
        HAND_BONES.forEach(([bA,bB])=>{ const ptA=lm[bA], ptB=lm[bB]; if(ptA&&ptB){ ctxM.beginPath(); ctxM.moveTo((1-ptA.x)*W,ptA.y*H); ctxM.lineTo((1-ptB.x)*W,ptB.y*H); ctxM.globalAlpha=0.18; ctxM.stroke(); } }); ctxM.restore(); 
      } 
    });
    ctxUi.clearRect(0,0,W,H); 
    ['L','R'].forEach(side=>{ 
      const col=side==='L'?(isNight?'#f0c040':'#b87800'):(isNight?'#40c8f0':'#006ea8'); 
      handPos[side].forEach(f=>{ ctxUi.beginPath(); ctxUi.arc(f.sx,f.sy,10,0,Math.PI*2); ctxUi.fillStyle=col; ctxUi.fill(); }); 
    });
  }
  drawScope(); 
}

    recBtn.textContent='⏹ STOP EXPORT'; 
    recBtn.classList.add('rec-on'); 
    recTimer.textContent='REC'; 
    
    // Iniciar captura del flujo de audio del MediaStreamDestination para exportación directa
    recordedChunks = [];
    mediaRecorder = new MediaRecorder(recDest.stream, { mimeType: 'audio/webm' });
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      const blob = new Blob(recordedChunks, { type: 'audio/webm' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `DJSTROMA_Cover_${Date.now()}.webm`;
      a.click();
    };
    mediaRecorder.start();
    showToast('Grabando master de audio directamente...'); 
  } 
});

// Implementación del Modo Partitura
scoreBtn.addEventListener('click', () => {
  ensureAudio();
  if (state.scoreMode) {
    // Apagar modo partitura
    state.scoreMode = false;
    if (state.scoreAudioSource) { try { state.scoreAudioSource.stop(); } catch(e){} }
    scoreBtn.classList.remove('on');
    scoreBtn.textContent = '🎵 MOD PARTITURA';
    showToast("Modo libre reactivado.");
  } else {
    audioUpload.click();
  }
});

audioUpload.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  showToast("Decodificando archivo MP3...");
  
  const reader = new FileReader();
  reader.onload = function(evt) {
    ctx.decodeAudioData(evt.target.result, (buffer) => {
      state.scoreAudioBuffer = buffer;
      state.scoreMode = true;
      scoreBtn.classList.add('on');
      scoreBtn.textContent = '⏹ DETENER PARTITURA';
      
      // Lanzar reproducción interna apuntando al analizador armónico
      state.scoreAudioSource = ctx.createBufferSource();
      state.scoreAudioSource.buffer = state.scoreAudioBuffer;
      
      state.scoreAnalyser = ctx.createAnalyser();
      state.scoreAnalyser.fftSize = 512;
      
      // Conectar el track a las salidas y al grabador/limiter
      state.scoreAudioSource.connect(state.scoreAnalyser);
      state.scoreAudioSource.connect(masterGain); 
      
      state.scoreAudioSource.start(0);
      showToast("Modo Partitura Activo: Observación Pura en Afinación Justa");
      
      state.scoreAudioSource.onended = () => {
        state.scoreMode = false;
        scoreBtn.classList.remove('on');
        scoreBtn.textContent = '🎵 MOD PARTITURA';
      };
    }, (err) => showToast("Error al decodificar audio. Intenta otro mp3."));
  };
  reader.readAsArrayBuffer(file);
});

dlBtn.addEventListener('click',()=>{ state.loopEvents=[]; dlBtn.style.display='none'; showToast('Secuencias de loop borradas'); });
let isMuted=false; document.getElementById('mute-btn').addEventListener('click',()=>{ ensureAudio(); isMuted=!isMuted; masterGain.gain.setTargetAtTime(isMuted?0:state.vol,ctx.currentTime,.06); const btn=document.getElementById('mute-btn'); btn.textContent=isMuted?'🔇':'VOL'; btn.classList.toggle('on',isMuted); });
document.getElementById('scale-sel').addEventListener('change',e=>{ state.scale=e.target.value; buildZones(); showToast('Escala Cambiada: '+e.target.value); });
document.getElementById('style-sel').addEventListener('change',e=>{ state.style=e.target.value; showToast('Timbre: '+e.target.value); });
document.getElementById('bpm-sel').addEventListener('change',e=>{ state.bpm=parseInt(e.target.value); state.loopDuration=(60/state.bpm)*state.loopBeats; showToast('Tempo: '+e.target.value+' BPM'); });
const themeBtn=document.getElementById('theme-btn'); themeBtn.addEventListener('click',()=>{ state.theme=state.theme==='night'?'day':'night'; document.body.dataset.theme=state.theme; themeBtn.textContent=state.theme==='night'?'☀':'🌙'; });
document.getElementById('freq-btn').addEventListener('click',()=>{ ensureAudio(); document.getElementById('freq-modal').classList.add('open'); });
document.getElementById('freq-close').addEventListener('click',()=>{ document.getElementById('freq-modal').classList.remove('open'); });

function updateSliderPct(el){ const pct=((el.value-el.min)/(el.max-el.min)*100).toFixed(1)+'%'; el.style.setProperty('--pct',pct); }
const freqSl=document.getElementById('freq-sl'), volSl=document.getElementById('vol-sl'), octSl=document.getElementById('oct-sl');
freqSl.addEventListener('input',()=>{ state.baseFreq=parseFloat(freqSl.value); document.getElementById('freq-disp').textContent=`${freqSl.value} Hz`; updateSliderPct(freqSl); buildZones(); });
volSl.addEventListener('input',()=>{ state.vol=parseInt(volSl.value)/100; document.getElementById('vol-disp').textContent=volSl.value+'%'; if(masterGain&&!isMuted) masterGain.gain.setTargetAtTime(state.vol,ctx.currentTime,.05); updateSliderPct(volSl); });
octSl.addEventListener('input',()=>{ state.baseOct=parseInt(octSl.value); document.getElementById('oct-disp').textContent='Octava Base '+octSl.value; updateSliderPct(octSl); buildZones(); });
document.getElementById('vinyl-chk').addEventListener('change',e=>{ state.vinyl=e.target.checked; });

[freqSl,volSl,octSl].forEach(updateSliderPct);
let toastT=null; function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),3000); }

['click','touchstart'].forEach(ev=>{ document.addEventListener(ev,()=>{ ensureAudio(); if(ctx?.state==='suspended') ctx.resume(); },{once:true,passive:true}); });
window.addEventListener('load',()=>{ resize(); requestAnimationFrame(render); setTimeout(initMediaPipe,400); });
</script>
</body>
